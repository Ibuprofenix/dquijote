<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Quijote - Nivel 2: La Horda</title>
    <link rel="stylesheet" href="maestro.css">
    <style>
        #escenario { position: relative; display: flex; justify-content: center; align-items: center; }
        
        /* Estilo para el botón dinámico */
        #btnAccion {
            display: none;
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: 3px solid #3e2723;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1100;
            font-family: 'Georgia', serif;
        }

        #resumenGesta {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            background: #fdf5e6;
            border: 6px double #5d4037;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            z-index: 1000;
            font-family: 'Cinzel', serif;
        }
    </style>
</head>
<body class="nivel2">
    <h1 class="game-header">LA HORDA DE GIGANTES</h1>
    
    <div id="escenario">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="resumenGesta"></div>
        <button id="btnAccion"></button>
    </div>

    <script src="gestionDatos.js"></script>
    <script src="interfaz.js"></script>
    <script src="motor2.js"></script>

    <script>
        window.onload = () => {
            const canvasElement = document.getElementById('gameCanvas');
            // 'iniciar' debe estar definido dentro de motor2.js
            if (typeof configurarInicio === 'function' && typeof iniciar === 'function') {
                configurarInicio(canvasElement, iniciar); 
            } else {
                console.error("Error: motor2.js o gestionDatos.js no cargados.");
            }
        };
    </script>
</body>
</html>
