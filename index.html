<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: El Desenlace</title>
    <style>
        body { margin: 0; background: #d2b48c; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { background: #fdf5e6; border: 8px double #3e2723; box-shadow: 0 0 50px rgba(0,0,0,0.6); cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    // --- SISTEMA DE AUDIO ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(f, t, d, v=0.1) {
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.type=t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime+d);
    }

    // SONIDO DE CRASH (Explosión orgánica)
    function playCrash() {
        const bufferSize = audioCtx.sampleRate * 0.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass'; filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.4);
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start();
    }

    // --- BANCO DE PREGUNTAS ---
    const quizBank = [
        { q: "¿Cómo se llamaba Don Quijote antes de ser caballero?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
        { q: "¿Qué cree el Quijote que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
        { q: "¿En qué batalla perdió Cervantes el uso de su mano?", o: ["a) Trafalgar", "b) Lepanto", "c) Bailén", "d) Navas de Tolosa"], c: "KeyB" },
        { q: "¿Qué objeto confunde con un yelmo?", o: ["a) Sombrero", "b) Bacía de barbero", "c) Una olla", "d) Casco romano"], c: "KeyB" },
        { q: "¿Cómo se llama el caballo de Don Quijote?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" }
    ];

    const STATE_MENU = 0, STATE_PLAYING = 1, STATE_GAMEOVER = 2, STATE_VICTORY = 3, STATE_THE_END = 4, STATE_QUIZ = 5;
    let currentState = STATE_MENU;
    let level = 1, score = 0, lives = 3, usedFierabras = false, quizSequence = [], quizIndex = 0;
    
    const player = { x: 400, y: 530, speed: 7, shake: 0, powerUp: 0 };
    const spears = [], projectiles = [], mills = [], particles = [], heartsOnGround = [], items = [];
    let sancho = { x: -100, y: 540, active: false, state: 'entering', sanchoUsed: false };
    let enemyDirection = 1, enemySpeed = 1.1, bladeRotation = 0, globalCooldown = 0;

    window.onkeydown = (e) => {
        if (currentState === STATE_QUIZ) {
            if (e.code === quizSequence[quizIndex].c) {
                quizIndex++; if (quizIndex >= 3) { usedFierabras = true; startNewGame(3); }
            } else if (["KeyA", "KeyB", "KeyC", "KeyD"].includes(e.code)) { currentState = STATE_GAMEOVER; }
            return;
        }
        if (e.code === 'Space' && currentState === STATE_PLAYING) {
            const isP = player.powerUp > 0;
            spears.push({ x: player.x, y: player.y - 25, w: isP?8:4, h: isP?40:25, piercing: isP, color: isP?"#ff6d00":"#b71c1c" });
            playSound(isP?150:300, 'triangle', 0.1);
        }
        keys[e.code] = true;
    };
    const keys = {};
    window.onkeyup = (e) => keys[e.code] = false;

    canvas.onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (currentState === STATE_MENU) startNewGame(1);
        else if (currentState === STATE_VICTORY) startNewGame(level + 1);
        else if (currentState === STATE_GAMEOVER || currentState === STATE_THE_END) currentState = STATE_MENU;
    };

    function startNewGame(tL) {
        level = tL; if (level === 1) { score = 0; usedFierabras = false; }
        lives = 3; enemySpeed = 1.1 + (level * 0.4);
        spears.length = 0; projectiles.length = 0; particles.length = 0; heartsOnGround.length = 0; items.length = 0;
        player.x = 400; sancho.active = false; sancho.sanchoUsed = false;
        initEnemies(); currentState = STATE_PLAYING;
    }

    function initEnemies() {
        mills.length = 0;
        let rows = level === 1 ? 3 : 2;
        if (level === 3) { mills.push({ x: 400, y: 150, alive: true, hp: 15, boss: true }); rows = 1; }
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < 8; c++) {
                mills.push({ x: c * 90 + 80, y: r * 90 + (level === 3 ? 320 : 80), alive: true, hp: level === 1 ? 1 : 2 });
            }
        }
    }

    function update() {
        if (currentState !== STATE_PLAYING) return;
        if (keys['ArrowLeft'] && player.x > 50) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x < 750) player.x += player.speed;

        let edgeHit = false; let activeEnemies = 0;
        mills.forEach(m => {
            if (!m.alive) return; activeEnemies++;
            if (!m.boss) {
                m.x += enemySpeed * enemyDirection;
                if (m.x > 760 || m.x < 40) edgeHit = true;
                if (m.y + 40 >= player.y) { lives = 0; checkDeath(); }
            }
            spears.forEach((s, si) => {
                let hit = m.boss ? 70 : 30;
                if (Math.abs(s.x - m.x) < hit && Math.abs(s.y - m.y) < hit) {
                    m.hp--; if (!s.piercing) spears.splice(si, 1);
                    if (m.hp <= 0) { 
                        m.alive = false; score += (m.boss?1000:150); 
                        playCrash(); // NUEVO SONIDO
                        for(let k=0; k<20; k++) particles.push({x:m.x, y:m.y, vx:Math.random()*6-3, vy:Math.random()*-8, life:50, color:level===1?"#fff":"#3e2723", size:Math.random()*5+2});
                    }
                }
            });
        });
        if (edgeHit) { enemyDirection *= -1; mills.forEach(m => { if(m.alive && !m.boss) m.y += 20; }); }

        // Proyectiles y colisiones
        if (globalCooldown > 0) globalCooldown--;
        mills.forEach(m => {
            if (m.alive && globalCooldown <= 0 && Math.random() < (m.boss?0.06:0.01)) {
                let vx = 0, vy = 3;
                if (m.boss) { let a = Math.atan2(player.y - m.y, player.x - m.x); vx = Math.cos(a)*5; vy = Math.sin(a)*5; }
                projectiles.push({x:m.x, y:m.y, vx, vy}); globalCooldown = m.boss?35:60;
            }
        });

        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i]; p.x += p.vx; p.y += p.vy;
            if (Math.hypot(p.x - player.x, p.y - player.y) < 25) { lives--; player.shake = 8; projectiles.splice(i, 1); checkDeath(); }
            else if (p.y > 600) projectiles.splice(i,1);
        }

        for (let i = spears.length-1; i>=0; i--) { spears[i].y -= 10; if(spears[i].y < 0) spears.splice(i,1); }
        particles.forEach((p, i) => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--; if(p.life<=0) particles.splice(i,1); });
        bladeRotation += 0.08;
        if (activeEnemies === 0) currentState = level===3?STATE_THE_END:STATE_VICTORY;
        if (player.shake > 0) player.shake--;
    }

    function checkDeath() {
        if (lives <= 0) {
            if (level === 3 && !usedFierabras) {
                currentState = STATE_QUIZ; quizIndex = 0;
                quizSequence = [...quizBank].sort(() => 0.5 - Math.random()).slice(0, 3);
            } else currentState = STATE_GAMEOVER;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, 800, 600);
        if (currentState === STATE_MENU) {
            ctx.fillStyle = "#3e2723"; ctx.textAlign = "center";
            ctx.font = "bold 50px Georgia"; ctx.fillText("DON QUIJOTE", 400, 220);
            ctx.font = "italic 22px Georgia"; ctx.fillText("Capítulo I: La Gesta", 400, 260);
            ctx.fillRect(300, 350, 200, 50); ctx.fillStyle = "#fdf5e6"; ctx.fillText("JUGAR", 400, 385);
        } else if (currentState === STATE_QUIZ) {
            ctx.fillStyle = "rgba(62, 39, 35, 0.95)"; ctx.fillRect(50, 50, 700, 500);
            ctx.fillStyle = "#fdf5e6"; ctx.textAlign = "center";
            ctx.font = "bold 24px Georgia"; ctx.fillText("¡EL BÁLSAMO DE FIERABRÁS! ("+(quizIndex+1)+"/3)", 400, 120);
            let q = quizSequence[quizIndex]; ctx.font = "20px Georgia"; ctx.fillText(q.q, 400, 200);
            q.o.forEach((opt, i) => ctx.fillText(opt, 400, 280 + (i * 50)));
        } else {
            // DIBUJAR QUIJOTE
            ctx.save(); ctx.translate(player.x, player.y);
            if(player.shake>0) ctx.translate(Math.random()*4-2, 0);
            ctx.fillStyle = "#eee"; ctx.beginPath(); ctx.ellipse(0, 10, 12, 18, Math.PI/2, 0, 7); ctx.fill();
            ctx.fillStyle = "#999"; ctx.beginPath(); ctx.arc(0, -22, 7, 0, Math.PI, true); ctx.fill();
            ctx.restore();

            spears.forEach(s => { ctx.fillStyle = s.color; ctx.fillRect(s.x-s.w/2, s.y-s.h, s.w, s.h); });

            // DIBUJAR ENEMIGOS (Molinos Nivel 1, GIGANTES Nivel 2 y 3)
            mills.forEach(m => {
                if (!m.alive) return;
                ctx.save(); ctx.translate(m.x, m.y); if (m.boss) ctx.scale(2.5, 2.5);
                ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 2;
                
                if (level === 1) { // MOLINOS ORIGINALES
                    ctx.fillStyle = "white"; ctx.beginPath(); ctx.moveTo(-15, 20); ctx.lineTo(-10, -15); ctx.lineTo(10, -15); ctx.lineTo(15, 20); ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.rotate(bladeRotation); for (let i=0; i<4; i++) { ctx.rotate(Math.PI/2); ctx.strokeRect(-5,10,10,15); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,30); ctx.stroke(); }
                } else { // GIGANTES ORIGINALES
                    ctx.fillStyle = "#3e2723"; ctx.fillRect(-15, -10, 30, 45); // Cuerpo
                    ctx.fillStyle = "#5d4037"; ctx.beginPath(); ctx.arc(0, -20, 15, 0, 7); ctx.fill(); ctx.stroke(); // Cabeza
                    ctx.save(); ctx.rotate(Math.sin(bladeRotation)); // Brazos moviéndose
                    ctx.fillStyle = "#3e2723"; ctx.fillRect(-40, -5, 40, 10); ctx.fillRect(0, -5, 40, 10); ctx.restore();
                }
                ctx.restore();
            });

            projectiles.forEach(p => { ctx.fillStyle = level===1?"#aaa":"#5d4037"; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill(); });
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
            
            ctx.fillStyle = "#3e2723"; ctx.font = "bold 18px Georgia"; ctx.textAlign = "left";
            ctx.fillText("Gloria: " + score + " | Honor: " + "♥".repeat(lives), 20, 40);
            if (currentState === STATE_GAMEOVER) { ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,600); ctx.fillStyle="white"; ctx.textAlign="center"; ctx.fillText("GESTA INTERRUMPIDA", 400, 300); }
        }
        requestAnimationFrame(draw);
    }
    setInterval(update, 1000/60); draw();
</script>
</body>
</html>
