<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: El Rescate - VERSIÓN FUNCIONAL</title>
    <style>
        body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; overflow: hidden; color: white; }
        canvas { background: #fdf5e6; border: 6px solid #5d4037; box-shadow: 0 0 15px rgba(0,0,0,0.5); cursor: crosshair; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- BANCO DE PREGUNTAS ---
    const quizBank = [
        { q: "¿En qué ciudad nació Cervantes?", o: ["a) Madrid", "b) Sevilla", "c) Alcalá de Henares", "d) Toledo"], c: "KeyC" },
        { q: "¿Por qué es el 'Manco de Lepanto'?", o: ["a) Nació así", "b) Herida en batalla", "c) Prisión", "d) Apodo falso"], c: "KeyB" },
        { q: "¿Nombre real de Don Quijote?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
        { q: "¿Qué cree que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
        { q: "¿Nombre del caballo de don Quijote?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" },
        { q: "¿En qué año se publica la 1.ª parte del Quijote?", o: ["a) 1605", "b) 1610", "c) 1615", "d) 1620"], c: "KeyA" },
        { q: "¿En qué año se publica la 2.ª parte del Quijote?", o: ["a) 1605", "b) 1610", "c) 1615", "d) 1620"], c: "KeyC" },
        { q: "¿Cuál no es una obra de Cervantes?", o: ["a) Los trabajos de Persiles y Segismunda", "b) Viaje del Parnaso", "c) Las novelas ejemplares", "d) La vida es sueño"], c: "KeyD" },
        { q: "¿Dónde sufre cautiverio Cervantes?", o: ["a) Estambul", "b) Argel", "c) Marraquech", "d) El Cairo"], c: "KeyB" },
        { q: "¿De dónde es Dulcinea, la amada de don Quijote?", o: ["a) Del Toboso", "b) De Toledo", "c) De Belmonte", "d) Guadalajara"], c: "KeyA" }
    ];

    // --- VARIABLES DE ESTADO Y JUEGO ---
    let state = 'START'; // START, PLAY, SUMMARY, TRIVIA, WIN, GAMEOVER
    let level = 1;
    let lives = 3;
    let timer = 0;
    let frame = 0;
    let currentQuiz = [];
    let quizIndex = 0;
    let hasBalsamUsed = false;
    let invulnerableTimer = 0;

    // Configuración del suelo
    const GROUND_Y = 480;

    // Entidades
    let q = { x: 100, y: GROUND_Y - 80, w: 40, h: 80, speed: 6, power: false, cooldown: 0 };
    let enemies = [];
    let spears = [];
    let sancho = { x: -60, y: GROUND_Y - 60, state: 'HIDDEN', targetX: 100, cooldown: 0 };
    let item = { x: 0, y: GROUND_Y - 30, active: false, type: '', timer: 0 };
    let keys = {};

    // --- CONTROLES ---
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if ((state === 'START' || state === 'SUMMARY') && e.code === 'Space') startLevel();
        if (state === 'TRIVIA') checkTrivia(e.code);
    };
    window.onkeyup = (e) => keys[e.code] = false;

    // --- LÓGICA DE NIVELES ---
    function startLevel() {
        if (state === 'SUMMARY') level++;
        if (level > 3) return;
        
        state = 'PLAY';
        enemies = [];
        spears = [];
        timer = 0;
        sancho.state = 'HIDDEN';
        sancho.cooldown = 300; // Un poco de espera para Sancho
        item.active = false;
        
        // Spawn de enemigos específicos por nivel
        if (level === 1) spawnEnemies(5, 'mill', 1); // Molinos (1 HP)
        if (level === 2) spawnEnemies(7, 'giant', 2); // Gigantes (2 HP)
        if (level === 3) {
            // Megagigante (Boss)
            enemies.push({ x: 650, y: GROUND_Y - 180, w: 100, h: 180, hp: 30, type: 'boss', sTimer: 0 });
        }
    }

    function spawnEnemies(count, type, hp) {
        for(let i=0; i<count; i++) {
            // Posición aleatoria sobre el suelo
            enemies.push({ x: 450 + i*130, y: GROUND_Y - 90, w: 60, h: 90, hp: hp, type: type, speed: type === 'giant' ? 1.5 : 0 });
        }
    }

    // --- BUCLE PRINCIPAL (LÓGICA) ---
    function update() {
        if (state !== 'PLAY') return;
        frame++;
        timer++;
        if (invulnerableTimer > 0) invulnerableTimer--;

        // Movimiento Don Quijote (Controles de dirección)
        if (keys['ArrowRight']) q.x += q.speed;
        if (keys['ArrowLeft']) q.x -= q.speed;
        // Salto básico (opcional)
        // Disparo (cada 20 frames)
        if (keys['Space'] && q.cooldown <= 0) { fireSpear(); q.cooldown = 20; }
        if (q.cooldown > 0) q.cooldown--;

        // Límites de pantalla para Quijote
        q.x = Math.max(0, Math.min(canvas.width - q.w, q.x));

        // Gestión de Sancho Panza (Nivel 2 y 3)
        if (level >= 2) {
            sancho.cooldown--;
            if (sancho.state === 'HIDDEN' && sancho.cooldown <= 0) sancho.state = 'IN';
            
            if (sancho.state === 'IN') {
                sancho.x += 2;
                if (sancho.x >= sancho.targetX) { dropItem(); sancho.state = 'OUT'; }
            } else if (sancho.state === 'OUT') {
                sancho.x -= 2;
                if (sancho.x < -60) { sancho.state = 'HIDDEN'; sancho.cooldown = 600; } // Espera 10s
            }
        }

        // Ítem de Ayuda (Dura 3 seg = 180 frames)
        if (item.active) {
            item.timer--;
            // Colisión Quijote con ítem
            if (hit(q, item)) {
                if (item.type === 'HEART') lives++;
                else { q.power = true; setTimeout(() => q.power = false, 5000); } // 5s de poder
                item.active = false;
            }
            if (item.timer <= 0) item.active = false;
        }

        // Lógica de Enemigos y Boss
        enemies.forEach((e, index) => {
            // Movimiento de Gigantes hacia la izquierda
            if (e.type === 'giant') {
                e.x -= e.speed;
                if (e.x < -e.w) e.x = canvas.width; // Reaparecer si sale
            }
            
            // Megagigante (Boss Nivel 3): Invocar pequeños gigantes
            if (e.type === 'boss') {
                e.sTimer++;
                if (e.sTimer > 240) { // Invocar cada 4 seg
                    enemies.push({ x: e.x, y: GROUND_Y - 70, w: 40, h: 70, hp: 1, type: 'giant', speed: 2.5 });
                    e.sTimer = 0;
                }
            }

            // Colisión Quijote contra enemigo (si no es invulnerable)
            if (hit(q, e) && invulnerableTimer <= 0) { 
                lives--; 
                invulnerableTimer = 60; // 1 segundo de invulnerabilidad
                checkDeath();
            }
        });

        // Lanzas (Proyectiles que van de izquierda a derecha)
        spears.forEach((s, si) => {
            s.x += s.speed;
            if (s.x > canvas.width) spears.splice(si, 1);

            enemies.forEach((e, ei) => {
                if (hit(s, e)) {
                    e.hp--;
                    spears.splice(si, 1);
                    if (e.hp <= 0) {
                        enemies.splice(ei, 1); 
                        if (e.type === 'boss') state = 'WIN'; // Victoria definitiva
                    }
                }
            });
        });

        // Verificar Victoria de Nivel (si quedan enemigos y no es el boss)
        if (level < 3 && enemies.length === 0) state = 'SUMMARY';
    }

    function fireSpear() {
        // La lanza sale de frente, hacia la derecha
        spears.push({ x: q.x + q.w, y: q.y + q.h/2 - 5, w: 30, h: 10, speed: 10 });
        // Lanza triple si tiene powermode
        if (q.power) {
            spears.push({ x: q.x + q.w, y: q.y + q.h/2 - 25, w: 30, h: 10, speed: 10 });
            spears.push({ x: q.x + q.w, y: q.y + q.h/2 + 15, w: 30, h: 10, speed: 10 });
        }
    }

    function dropItem() {
        // El ítem se queda donde Sancho se para
        item = { x: sancho.x + 20, y: sancho.y + 30, w: 20, h: 20, active: true, type: Math.random() > 0.5 ? 'HEART' : 'SPEAR', timer: 180 };
    }

    function checkDeath() {
        if (lives <= 0) {
            // Trivia solo en Nivel 3 y una vez
            if (level === 3 && !hasBalsamUsed) {
                currentQuiz = quizBank.sort(() => 0.5 - Math.random()).slice(0, 3);
                quizIndex = 0;
                state = 'TRIVIA';
            } else {
                state = 'GAMEOVER';
            }
        }
    }

    // Lógica de Trivia
    function checkTrivia(keyCode) {
        if (keyCode === currentQuiz[quizIndex].c) {
            quizIndex++;
            if (quizIndex >= 3) { lives = 1; hasBalsamUsed = true; state = 'PLAY'; }
        } else {
            state = 'GAMEOVER';
        }
    }

    // Colisión AABB simple
    function hit(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // --- RENDERIZADO (DIBUJO) ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Cielo y Suelo
        ctx.fillStyle = '#b3e5fc'; // Cielo azul claro
        ctx.fillRect(0, 0, canvas.width, GROUND_Y);
        ctx.fillStyle = '#8d6e63'; // Suelo tierra
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);

        // --- Dibujar Don Quijote (Rectángulo Azul) ---
        ctx.fillStyle = (invulnerableTimer > 0 && frame % 10 < 5) ? 'rgba(30,144,255,0.3)' : '#1e90ff';
        ctx.fillRect(q.x, q.y, q.w, q.h);
        // "Lanza" visual en la mano
        ctx.fillStyle = '#8b4513';
        ctx.fillRect(q.x + q.w/2, q.y + q.h/2, 40, 6);

        // --- Enemigos (Molinos/Gigantes/Boss) ---
        enemies.forEach(e => {
            if (e.type === 'mill') {
                ctx.fillStyle = '#d7ccc8'; // Molino grisáceo
                ctx.fillRect(e.x, e.y, e.w, e.h);
                // Aspas (estáticas o simples)
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(e.x + e.w/2 - 30, e.y + 20, 60, 6);
                ctx.fillRect(e.x + e.w/2 - 3, e.y - 10, 6, 60);
            } else if (e.type === 'giant') {
                ctx.fillStyle = '#bf360c'; // Gigante rojo-marrón
                ctx.fillRect(e.x, e.y, e.w, e.h);
            } else if (e.type === 'boss') {
                ctx.fillStyle = '#3e2723'; // Boss marrón oscuro
                ctx.fillRect(e.x, e.y, e.w, e.h);
            }
        });

        // --- Sancho Panza (Rectángulo Verde) ---
        if (sancho.state !== 'HIDDEN') {
            ctx.fillStyle = '#2e7d32';
            ctx.fillRect(sancho.x, sancho.y, 40, 60);
        }
        
        // --- Ítem de Ayuda (Círculo parpadeante) ---
        if (item.active) {
            if (item.timer > 60 || (item.timer <= 60 && frame % 10 < 5)) {
                ctx.fillStyle = item.type === 'HEART' ? 'red' : 'gold';
                ctx.beginPath(); ctx.arc(item.x + item.w/2, item.y + item.h/2, 10, 0, Math.PI*2); ctx.fill();
            }
        }

        // --- Proyectiles (Lanzas) ---
        ctx.fillStyle = q.power ? 'gold' : 'brown';
        spears.forEach(s => ctx.fillRect(s.x, s.y, s.w, s.h));

        // --- INTERFAZ (UI) PRINCIPAL ---
        ctx.fillStyle = 'black';
        ctx.textAlign = 'left';
        ctx.font = '22px Courier New';
        ctx.fillText(` Honor: ${lives}`, 20, 30);
        ctx.textAlign = 'right';
        ctx.fillText(` Nivel: ${level}/3 `, canvas.width - 20, 30);

        // --- PANTALLAS DE ESTADO ---
        if (state === 'START') overlay("DON QUIJOTE: EL RESCATE", "Usa FLECHAS para moverte\nESPACIO para lanzar lanza.\n\n[Pulsa ESPACIO para cabalgar]");
        if (state === 'SUMMARY') overlay("NIVEL SUPERADO", `Puntuación: ${timer}\n\n[Pulsa ESPACIO para continuar]`);
        if (state === 'GAMEOVER') overlay("DERROTADO", "Tu honor ha caído.\n\n[Pulsa F5 para reintentar]");
        if (state === 'WIN') overlay("¡VICTORIA ÉPICA!", "¡Has rescatado a Dulcinea de Frestón!\n\n[¡Felicidades, Caballero!]");
        if (state === 'TRIVIA') {
            let cur = currentQuiz[quizIndex];
            overlay("EL BÁLSAMO DE FIERABRÁS", "Demuestra tus conocimientos\nPregunta ${quizIndex+1}/3:\n\n" + `${cur.q}\n\n` + `${cur.o.join(' ')}\n\n` + "Pulsa [A], [B], [C] o [D]");
        }
    }

    // Utilidad para dibujar overlays de texto
    function overlay(title, sub) {
        ctx.fillStyle = 'rgba(253, 245, 230, 0.9)'; // Pergamino
        ctx.fillRect(50, 100, 700, 400);
        ctx.fillStyle = 'black';
        ctx.textAlign = 'center';
        ctx.font = 'bold 36px Courier New';
        ctx.fillText(title, 400, 180);
        ctx.font = '20px Courier New';
        let lines = sub.split('\n');
        lines.forEach((l, i) => ctx.fillText(l, 400, 240 + i*30));
    }

    // --- BUCLE DE ANIMACIÓN ---
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // INICIO
    startLevel(); // Cargar datos iniciales
    state = 'START'; // Pero mostrar pantalla de inicio
    gameLoop();

    </script>
</body>
</html>
