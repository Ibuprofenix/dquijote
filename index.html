<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quijote Invaders - La Gesta Definitiva</title>
    <link rel="stylesheet" href="maestro.css">
    <style>
        #escenario { position: relative; display: flex; justify-content: center; align-items: center; }
        #resumenGesta {
            display: none;
            position: absolute;
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            background: #fdf5e6;
            border: 6px double #5d4037;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            z-index: 1000;
        }
    </style>
</head>
<body id="juego-body" class="nivel1"> <h1 class="game-header" id="titulo-nivel">CARGANDO AVENTURA...</h1>
    
    <div id="escenario">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="resumenGesta"></div>
        <button id="btnAccion"></button>
    </div>

    <div id="game-ui">
        <b>Controles:</b> Flechas para cabalgar · Espacio para lanzar la lanza <br>
        <span id="instruccion-nivel">"Vuestra merced, los molinos nos acechan."</span>
    </div>

    <script src="gestionDatos.js"></script>
    <script src="interfaz.js"></script>
    <script src="juego.js"></script>

    <script>
        window.onload = () => {
            // Lógica de navegación interna:
            // Miramos si hay un nivel guardado en la sesión, si no, empezamos en el 1
            const nivelGuardado = localStorage.getItem('quijote_nivel') || '1';
            const body = document.getElementById('juego-body');
            
            // Aplicamos la clase y el título según el nivel guardado
            body.className = `nivel${nivelGuardado}`;
            
            const titulos = {
                '1': 'LOS MOLINOS DE CRIPTANA',
                '2': 'LA HORDA DE GIGANTES',
                '3': 'EL DUELO FINAL'
            };
            const textos = {
                '1': '"Mire vuestra merced que aquellos son gigantes..."',
                '2': '"¡Non fuyades, cobardes y viles criaturas!"',
                '3': '"Aquí fenecerá la soberbia del Gigante Supremo."'
            };

            document.getElementById('titulo-nivel').innerText = titulos[nivelGuardado];
            document.getElementById('instruccion-nivel').innerText = textos[nivelGuardado];

            const canvasElement = document.getElementById('gameCanvas');
            
            if (typeof iniciar === 'function') {
                // El motor ya sabe qué nivel es leyendo body.className
                if (typeof configurarInicio === 'function') {
                    configurarInicio(canvasElement, iniciar);
                } else {
                    canvasElement.addEventListener('click', iniciar, { once: true });
                }
            }
        };

        // Función para avanzar de nivel sin recargar otra página
        function avanzarNivel() {
            const nivelActual = parseInt(localStorage.getItem('quijote_nivel') || '1');
            if (nivelActual < 3) {
                localStorage.setItem('quijote_nivel', nivelActual + 1);
                location.reload(); // Recarga el mismo HTML pero ahora será el siguiente nivel
            } else {
                localStorage.setItem('quijote_nivel', '1');
                location.reload(); // Volver al inicio
            }
        }
    </script>
</body>
</html>
