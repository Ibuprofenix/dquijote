<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: El Desenlace</title>
    <style>
        body { margin: 0; background: #d2b48c; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { background: #fdf5e6; border: 8px double #3e2723; box-shadow: 0 0 50px rgba(0,0,0,0.6); cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    // --- CONFIGURACIÓN GOOGLE SHEETS ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxOwDjEociKwxPRh_hHVlQDr9xHXSE2akSpEpXS-0OIcJrxnNOtP7t8oQ0AC5L1QwHN/exec";
    let nombreJugador = "";
    let registroEnviado = false;

    function enviarDatos() {
        if (registroEnviado) return; 
        
        const datos = {
            nombre: nombreJugador || "Anónimo",
            puntuacion: score,
            vidas: lives,
            nivel: level
        };

        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            body: JSON.stringify(datos)
        });
        
        registroEnviado = true;
        console.log("Gesta registrada en los anales de la historia.");
    }

    // --- VARIABLES DEL JUEGO ---
    const keys = {};
    const STATE_MENU = 0, STATE_PLAYING = 1, STATE_GAMEOVER = 2, STATE_VICTORY = 3, STATE_THE_END = 4, STATE_QUIZ = 5;
    let currentState = STATE_MENU;
    let level = 1, score = 0, lives = 3, enemiesDefeated = 0;
    let usedFierabras = false, quizSequence = [], quizIndex = 0;

    const player = { x: 400, y: 530, speed: 7, powerUp: 0 };
    const spears = [], projectiles = [], mills = [], heartsOnGround = [], items = [], particles = [];
    let sancho = { x: -120, y: 540, active: false, state: 'entering', timer: 0, sanchoUsed: false };
    let enemyDirection = 1, enemySpeed = 1.1, bladeRotation = 0, globalCooldown = 0;

    const quizBank = [
        { q: "¿En qué ciudad nació Cervantes?", o: ["a) Madrid", "b) Sevilla", "c) Alcalá de Henares", "d) Toledo"], c: "KeyC" },
        { q: "¿Por qué es el 'Manco de Lepanto'?", o: ["a) Nació así", "b) Herida en batalla", "c) Prisión", "d) Apodo falso"], c: "KeyB" },
        { q: "¿Nombre real de Don Quijote?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
        { q: "¿Qué cree que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
        { q: "¿Nombre de su caballo?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" }
    ];

    // --- EVENTOS ---
    window.onkeydown = (e) => {
        if (currentState === STATE_QUIZ) {
            if (e.code === quizSequence[quizIndex].c) {
                quizIndex++; 
                if (quizIndex >= 3) { usedFierabras = true; startLevel(3); }
            } else if (["KeyA", "KeyB", "KeyC", "KeyD"].includes(e.code)) { 
                currentState = STATE_GAMEOVER;
                enviarDatos(); 
            }
            return;
        }
        keys[e.code] = true;
        if (e.code === 'Space' && currentState === STATE_PLAYING) {
            const isP = player.powerUp > 0;
            spears.push({ x: player.x, y: player.y-25, w: isP?8:4, h: isP?40:25, piercing: isP, color: isP?"#ff6d00":"#b71c1c" });
        }
    };
    window.onkeyup = (e) => keys[e.code] = false;

    canvas.onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (currentState === STATE_MENU) {
            nombreJugador = prompt("¿Cuál es vuestro nombre, hidalgo caballero?", "Alonso Quijano");
            registroEnviado = false; 
            startLevel(1);
        }
        else if (currentState === STATE_VICTORY) startLevel(level + 1);
        else if (currentState === STATE_GAMEOVER || currentState === STATE_THE_END) {
            level = 1; score = 0; usedFierabras = false; currentState = STATE_MENU;
        }
    };

    // --- AUDIO ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playCrash() {
        const b = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.4, audioCtx.sampleRate);
        const d = b.getChannelData(0);
        for (let i = 0; i < b.length; i++) d[i] = Math.random() * 2 - 1;
        const n = audioCtx.createBufferSource(); n.buffer = b;
        const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; 
        f.frequency.setValueAtTime(1200, audioCtx.currentTime);
        f.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
        const g = audioCtx.createGain(); g.gain.setValueAtTime(0.2, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        n.connect(f); f.connect(g); g.connect(audioCtx.destination); n.start();
    }

    // --- FUNCIONES DE DIBUJO ---
    function drawQuijote(x, y) {
        ctx.save(); ctx.translate(x, y);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.fillStyle = "#eee";
        ctx.beginPath(); ctx.ellipse(0, 10, 14, 20, Math.PI/2, 0, 7); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#999"; ctx.beginPath(); ctx.arc(0, -22, 8, 0, Math.PI, true); ctx.fill(); ctx.stroke();
        ctx.restore();
    }

    function drawSancho(x, y) {
        ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = "#8d6e63"; ctx.beginPath(); ctx.ellipse(0, 10, 16, 22, Math.PI/2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#5d4037"; ctx.fillRect(-10, -5, 20, 25);
        ctx.fillStyle = "#d2b48c"; ctx.beginPath(); ctx.arc(0, -15, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#2e7d32"; 
        ctx.beginPath(); ctx.arc(0, -20, 14, Math.PI, 0); ctx.fill();
        ctx.fillRect(-16, -21, 32, 4);
        ctx.restore();
    }

    function createDebris(x, y, color, count) {
        for(let k=0; k<count; k++) {
            particles.push({
                x: x, y: y,
                vx: Math.random()*8 - 4,
                vy: Math.random()*-10 - 2,
                life: 60 + Math.random()*30,
                color: color,
                size: Math.random()*6 + 2,
                rot: Math.random()*Math.PI*2,
                vRot: Math.random()*0.2 - 0.1
            });
        }
    }

    // --- LÓGICA DE JUEGO ---
    function startLevel(tL) {
        level = tL;
        lives = 3; enemiesDefeated = 0; enemySpeed = 1.1 + (level * 0.5);
        spears.length = 0; projectiles.length = 0; items.length = 0; heartsOnGround.length = 0; particles.length = 0;
        player.x = 400; player.powerUp = 0;
        sancho.active = false; sancho.sanchoUsed = false; 
        initEnemies();
        currentState = STATE_PLAYING;
    }

    function initEnemies() {
        mills.length = 0;
        let rows = (level === 1) ? 3 : 2;
        if (level === 3) { mills.push({ x: 400, y: 150, alive: true, hp: 15, boss: true }); rows = 1; }
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < 8; c++) {
                mills.push({ x: c * 90 + 80, y: r * 90 + (level === 3 ? 320 : 80), alive: true, hp: (level === 1 ? 1 : 2) });
            }
        }
    }

    function checkDeath() {
        lives = 0;
        if (level === 3 && !usedFierabras) { 
            currentState = STATE_QUIZ; quizIndex = 0; quizSequence = [...quizBank].sort(() => 0.5 - Math.random()).slice(0, 3); 
        } else { 
            currentState = STATE_GAMEOVER;
            enviarDatos(); // REGISTRO AL PERDER
        }
    }

    function update() {
        if (currentState !== STATE_PLAYING) return;
        if (keys['ArrowLeft'] && player.x > 50) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x < 750) player.x += player.speed;
        if (player.powerUp > 0) player.powerUp--;

        if (level >= 2 && !sancho.sanchoUsed && !sancho.active && Math.random() < 0.005) { sancho.active = true; sancho.state = 'entering'; sancho.x = -120; sancho.sanchoUsed = true; }
