<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: El Desenlace</title>
    <style>
        body { margin: 0; background: #d2b48c; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; }
        #game-container { position: relative; }
        canvas { background: #fdf5e6; border: 8px double #3e2723; box-shadow: 0 0 50px rgba(0,0,0,0.6); cursor: pointer; display: block; }
        
        #btnPuntuaciones {
            display: none;
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: 3px solid #3e2723;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <button id="btnPuntuaciones" onclick="verPuntuaciones()">VER CLASIFICACIÓN</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    // --- CONFIGURACIÓN ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzDQKeRoY27_L3cpX3qb3YvW1vMhHdpx2OHamZumKs4TqPgE93Smjzu6SPmY4RYEqiR/exec";
    const WEB_PUNTUACIONES = "https://educastur.sharepoint.com/sites/lospasosdelcid/SitePages/La_Mancha_Invaders.aspx?csf=1&web=1&e=GZTQm7&CID=c144ab21-57f7-4f02-a507-0e15c77abb06"; // <--- PON TU WEB AQUÍ

    let nombreJugador = "";
    let registroEnviado = false;
    const keys = {};
    const STATE_MENU = 0, STATE_PLAYING = 1, STATE_GAMEOVER = 2, STATE_VICTORY = 3, STATE_THE_END = 4, STATE_QUIZ = 5;
    let currentState = STATE_MENU;
    let level = 1, score = 0, lives = 3, enemiesDefeated = 0;
    let usedFierabras = false, quizSequence = [], quizIndex = 0;

    const player = { x: 400, y: 530, speed: 7, powerUp: 0 };
    const spears = [], projectiles = [], mills = [], heartsOnGround = [], items = [], particles = [];
    let sancho = { x: -120, y: 540, active: false, state: 'entering', timer: 0, sanchoUsed: false };
    let enemyDirection = 1, enemySpeed = 1.1, bladeRotation = 0, globalCooldown = 0;

    const quizBank = [
        { q: "¿En qué ciudad nació Cervantes?", o: ["a) Madrid", "b) Sevilla", "c) Alcalá de Henares", "d) Toledo"], c: "KeyC" },
        { q: "¿Por qué es el 'Manco de Lepanto'?", o: ["a) Nació así", "b) Herida en batalla", "c) Prisión", "d) Apodo falso"], c: "KeyB" },
        { q: "¿Nombre real de Don Quijote?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
        { q: "¿Qué cree que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
        { q: "¿Nombre de su caballo?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" }
    ];

    function enviarDatos() {
        if (registroEnviado) return;
        fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ nombre: nombreJugador || "Anónimo", puntuacion: score, vidas: lives, nivel: level })
        });
        registroEnviado = true;
    }

    function verPuntuaciones() { window.open(WEB_PUNTUACIONES, '_blank'); }

    function gestionarBoton(show) { document.getElementById('btnPuntuaciones').style.display = show ? "block" : "none"; }

    function drawQuijote(x, y) {
        ctx.save(); ctx.translate(x, y);
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.fillStyle = "#eee";
        ctx.beginPath(); ctx.ellipse(0, 10, 14, 20, Math.PI/2, 0, 7); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#999"; ctx.beginPath(); ctx.arc(0, -22, 8, 0, Math.PI, true); ctx.fill(); ctx.stroke();
        ctx.restore();
    }

    function drawSancho(x, y) {
        ctx.save(); ctx.translate(x, y);
        ctx.fillStyle = "#8d6e63"; ctx.beginPath(); ctx.ellipse(0, 10, 16, 22, Math.PI/2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#5d4037"; ctx.fillRect(-10, -5, 20, 25);
        ctx.fillStyle = "#d2b48c"; ctx.beginPath(); ctx.arc(0, -15, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#2e7d32"; ctx.beginPath(); ctx.arc(0, -20, 14, Math.PI, 0); ctx.fill();
        ctx.fillRect(-16, -21, 32, 4); ctx.restore();
    }

    function startLevel(tL) {
        level = tL; lives = 3; enemiesDefeated = 0; enemySpeed = 1.1 + (level * 0.5);
        spears.length = 0; projectiles.length = 0; items.length = 0; heartsOnGround.length = 0; particles.length = 0;
        player.x = 400; player.powerUp = 0; sancho.active = false; sancho.sanchoUsed = false; 
        initEnemies(); currentState = STATE_PLAYING; gestionarBoton(false);
    }

    function initEnemies() {
        mills.length = 0;
        let rows = (level === 1) ? 3 : 2;
        if (level === 3) { mills.push({ x: 400, y: 150, alive: true, hp: 15, boss: true }); rows = 1; }
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < 8; c++) {
                mills.push({ x: c * 90 + 80, y: r * 90 + (level === 3 ? 320 : 80), alive: true, hp: (level === 1 ? 1 : 2) });
            }
        }
    }

    function checkDeath() {
        lives = 0;
        if (level === 3 && !usedFierabras) { 
            currentState = STATE_QUIZ; quizIndex = 0; quizSequence = [...quizBank].sort(() => 0.5 - Math.random()).slice(0, 3); 
        } else { 
            currentState = STATE_GAMEOVER; enviarDatos(); 
        }
    }

    function update() {
        if (currentState !== STATE_PLAYING) return;
        if (keys['ArrowLeft'] && player.x > 50) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x < 750) player.x += player.speed;
        if (player.powerUp > 0) player.powerUp--;

        if (level >= 2 && !sancho.sanchoUsed && !sancho.active && Math.random() < 0.005) { sancho.active = true; sancho.state = 'entering'; sancho.x = -120; sancho.sanchoUsed = true; }
        if (sancho.active) {
            if (sancho.state === 'entering') { sancho.x += 2; if (sancho.x >= 80) { sancho.state = 'throwing'; sancho.timer = 60; } }
            else if (sancho.state === 'throwing') {
                sancho.timer--; if (sancho.timer === 30) heartsOnGround.push({ x: sancho.x+20, y: sancho.y-20, vy: -6, vx: 4, landed: false });
                if (sancho.timer <= 0) sancho.state = 'leaving';
            } else if (sancho.state === 'leaving') { sancho.x -= 2; if (sancho.x < -120) sancho.active = false; }
        }

        heartsOnGround.forEach((h, i) => {
            if (!h.landed) { h.x += h.vx; h.y += h.vy; h.vy += 0.2; if (h.y >= 540) h.landed = true; }
            if (Math.hypot(h.x - player.x, h.y - player.y) < 30) { lives = Math.min(lives+1, 5); heartsOnGround.splice(i, 1); }
        });

        let edge = false; let activeCount = 0;
        mills.forEach(m => {
            if (!m.alive) return; activeCount++;
            if (!m.boss) { 
                m.x += enemySpeed * enemyDirection; if (m.x > 760 || m.x < 40) edge = true; 
                if (m.y + 30 >= player.y - 10) checkDeath();
            }
            spears.forEach((s, si) => {
                let hit = m.boss ? 70 : 30;
                if (Math.abs(s.x - m.x) < hit && Math.abs(s.y - m.y) < hit) {
                    m.hp--; if (!s.piercing) spears.splice(si, 1);
                    if (m.hp <= 0) { m.alive = false; score += 150; enemiesDefeated++; if (level >= 2 && enemiesDefeated === 3) items.push({ x: m.x, y: m.y }); }
                }
            });
        });
        if (edge) { enemyDirection *= -1; mills.forEach(m => { if(m.alive && !m.boss) m.y += 25; }); }
        items.forEach((it, i) => { it.y += 2; if (Math.hypot(it.x - player.x, it.y - player.y) < 30) { player.powerUp = 400; items.splice(i, 1); } });

        mills.forEach(m => {
            if (m.alive && globalCooldown <= 0 && Math.random() < (m.boss?0.06:0.01)) {
                let vx = 0, vy = 3.5; if (m.boss) { let a = Math.atan2(player.y-m.y, player.x-m.x); vx = Math.cos(a)*5; vy = Math.sin(a)*5; }
                projectiles.push({ x: m.x, y: m.y, vx, vy }); globalCooldown = m.boss?40:60;
            }
        });
        if (globalCooldown > 0) globalCooldown--;

        for (let i = projectiles.length-1; i>=0; i--) {
            let p = projectiles[i]; p.x += p.vx; p.y += p.vy;
            if (Math.hypot(p.x - player.x, p.y - player.y) < 25) { lives--; projectiles.splice(i, 1); if (lives <= 0) checkDeath(); }
            else if (p.y > 600) projectiles.splice(i,1);
        }

        spears.forEach((s, i) => { s.y -= 10; if (s.y < -50) spears.splice(i, 1); });
        bladeRotation += 0.08;
        if (activeCount === 0) { if (level === 3) { currentState = STATE_THE_END; enviarDatos(); } else currentState = STATE_VICTORY; }
    }

    function draw() {
        ctx.clearRect(0, 0, 800, 600);
        if (currentState === STATE_MENU) {
            ctx.fillStyle = "#3e2723"; ctx.textAlign = "center"; ctx.font = "bold 50px Georgia"; ctx.fillText("DON QUIJOTE", 400, 220);
            ctx.font = "italic 20px Georgia"; ctx.fillText("Flechas para mover | Espacio para atacar", 400, 270);
            ctx.fillRect(300, 350, 200, 50); ctx.fillStyle = "#fdf5e6"; ctx.font = "bold 20px Georgia"; ctx.fillText("CABALGAR", 400, 382);
        } else if (currentState === STATE_QUIZ) {
            ctx.fillStyle = "rgba(62, 39, 35, 0.95)"; ctx.fillRect(50, 50, 700, 500); ctx.fillStyle = "#fdf5e6"; ctx.textAlign = "center";
            ctx.font = "bold 24px Georgia"; ctx.fillText("¡EL BÁLSAMO DE FIERABRÁS!", 400, 120);
            let q = quizSequence[quizIndex]; ctx.font = "20px Georgia"; ctx.fillText(q.q, 400, 200);
            q.o.forEach((opt, i) => ctx.fillText(opt, 400, 280 + (i * 50)));
        } else if (currentState === STATE_VICTORY) {
            ctx.fillStyle = "#3e2723"; ctx.textAlign = "center"; ctx.font = "bold 40px Georgia"; ctx.fillText("¡GESTA COMPLETADA!", 400, 300);
        } else {
            if (sancho.active) drawSancho(sancho.x, sancho.y);
            heartsOnGround.forEach(h => { ctx.fillStyle = "red"; ctx.font = "20px serif"; ctx.fillText("♥", h.x, h.y); });
            items.forEach(it => { ctx.fillStyle = "#ffab00"; ctx.beginPath(); ctx.arc(it.x, it.y, 12, 0, 7); ctx.fill(); ctx.stroke(); });
            drawQuijote(player.x, player.y);
            spears.forEach(s => { ctx.fillStyle = s.color; ctx.fillRect(s.x-s.w/2, s.y-s.h, s.w, s.h); });
            mills.forEach(m => {
                if (!m.alive) return;
                ctx.save(); ctx.translate(m.x, m.y); if (m.boss) ctx.scale(2.5, 2.5);
                ctx.strokeStyle = "#3e2723"; ctx.lineWidth = 2;
                if (level === 1) {
                    ctx.fillStyle = "white"; ctx.beginPath(); ctx.moveTo(-15, 20); ctx.lineTo(-10, -15); ctx.lineTo(10, -15); ctx.lineTo(15, 20); ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.rotate(bladeRotation); for (let i=0; i<4; i++) { ctx.rotate(Math.PI/2); ctx.strokeRect(-5,10,10,15); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,30); ctx.stroke(); }
                } else {
                    ctx.fillStyle = "#3e2723"; ctx.fillRect(-15, -10, 30, 45); ctx.fillStyle = "#5d4037"; ctx.beginPath(); ctx.arc(0, -20, 15, 0, 7); ctx.fill(); ctx.stroke();
                    ctx.save(); ctx.rotate(Math.sin(bladeRotation)); ctx.fillStyle = "#3e2723"; ctx.fillRect(-40, -5, 40, 10); ctx.fillRect(0, -5, 40, 10); ctx.restore();
                }
                ctx.restore();
            });
            projectiles.forEach(p => { ctx.fillStyle = "#5d4037"; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill(); });
            ctx.fillStyle = "#3e2723"; ctx.font = "bold 18px Georgia"; ctx.textAlign = "left";
            ctx.fillText("Gloria: " + score + " | Honor: " + "♥".repeat(lives), 20, 40);
            
            if (currentState === STATE_GAMEOVER) { 
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,600); 
                ctx.fillStyle="white"; ctx.textAlign="center"; ctx.fillText("Gesta interrumpida. Clic para reintentar.", 400, 300); 
                gestionarBoton(true);
            }
            if (currentState === STATE_THE_END) { 
                ctx.fillStyle = "rgba(255,255,255,0.9)"; ctx.fillRect(0,0,800,600); 
                ctx.fillStyle="#3e2723"; ctx.textAlign="center"; ctx.fillText("¡DULCINEA ESTÁ A SALVO!", 400, 300); 
                gestionarBoton(true);
            }
        }
        requestAnimationFrame(draw);
    }

    window.onkeydown = (e) => {
        if (currentState === STATE_QUIZ) {
            if (e.code === quizSequence[quizIndex].c) { quizIndex++; if (quizIndex >= 3) { usedFierabras = true; startLevel(3); } } 
            else if (["KeyA", "KeyB", "KeyC", "KeyD"].includes(e.code)) { currentState = STATE_GAMEOVER; enviarDatos(); }
            return;
        }
        keys[e.code] = true;
        if (e.code === 'Space' && currentState === STATE_PLAYING) {
            const isP = player.powerUp > 0;
            spears.push({ x: player.x, y: player.y-25, w: isP?8:4, h: isP?40:25, piercing: isP, color: isP?"#ff6d00":"#b71c1c" });
        }
    };
    window.onkeyup = (e) => keys[e.code] = false;
    canvas.onclick = () => {
        if (currentState === STATE_MENU) {
            nombreJugador = prompt("¿Vuestro nombre, hidalgo?", "Alonso Quijano");
            registroEnviado = false; startLevel(1);
        }
        else if (currentState === STATE_VICTORY) startLevel(level + 1);
        else if (currentState === STATE_GAMEOVER || currentState === STATE_THE_END) { gestionarBoton(false); level = 1; score = 0; usedFierabras = false; currentState = STATE_MENU; }
    };
    setInterval(update, 1000/60);
    draw();
</script>
</body>
</html>
