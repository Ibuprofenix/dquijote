<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Don Quijote: El Desenlace</title>
<style>
    body {
        margin: 0;
        background: #d2b48c;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        font-family: Georgia, serif;
    }
    canvas {
        background: #fdf5e6;
        border: 8px double #3e2723;
        box-shadow: 0 0 50px rgba(0,0,0,0.6);
        cursor: pointer;
    }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 600;

/* ---------- ESTADOS ---------- */
const STATE_MENU = 0;
const STATE_PLAYING = 1;
let currentState = STATE_MENU;

/* ---------- JUGADOR ---------- */
const player = { x: 400, y: 530, speed: 7 };
const keys = {};

/* ---------- CONTROLES ---------- */
window.onkeydown = e => keys[e.code] = true;
window.onkeyup   = e => keys[e.code] = false;

canvas.onclick = () => {
    if (currentState === STATE_MENU) currentState = STATE_PLAYING;
};

/* ---------- UPDATE ---------- */
function update() {
    if (currentState !== STATE_PLAYING) return;

    if (keys["ArrowLeft"] && player.x > 50) player.x -= player.speed;
    if (keys["ArrowRight"] && player.x < 750) player.x += player.speed;
}

/* ---------- DRAW ---------- */
function draw() {
    ctx.clearRect(0, 0, 800, 600);

    /* ===== MENÚ INICIAL ===== */
    if (currentState === STATE_MENU) {
        ctx.fillStyle = "#3e2723";
        ctx.textAlign = "center";

        ctx.font = "bold 50px Georgia";
        ctx.fillText("DON QUIJOTE", 400, 190);

        ctx.font = "italic 24px Georgia";
        ctx.fillText("Capítulo I: Los Molinos", 400, 230);

        ctx.font = "bold 22px Georgia";
        ctx.fillText("CONTROLES", 400, 290);

        ctx.font = "18px Georgia";
        ctx.fillText("⬅️ ➡️  Flechas izquierda y derecha para moverse", 400, 325);
        ctx.fillText("␣  Barra espaciadora para atacar", 400, 355);

        ctx.fillStyle = "#3e2723";
        ctx.fillRect(300, 420, 200, 50);

        ctx.fillStyle = "#fdf5e6";
        ctx.font = "bold 20px Georgia";
        ctx.fillText("CABALGAR", 400, 452);
    }

    /* ===== JUEGO ===== */
    if (currentState === STATE_PLAYING) {
        ctx.fillStyle = "#3e2723";
        ctx.beginPath();
        ctx.arc(player.x, player.y, 15, 0, Math.PI * 2);
        ctx.fill();
    }

    update();
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
