<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: El Caballero de los Sprites</title>
    <style>
        body { background: #2c1b0e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { border: 4px solid #5d4037; background: #fdf5e6; image-rendering: pixelated; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    // --- CARGA DE ASSETS ---
    const imgQuijote = new Image(); imgQuijote.src = 'sprites_quijote.png';
    const imgGigantes = new Image(); imgGigantes.src = 'sprites_gigantes.png';
    const imgExplosiones = new Image(); imgExplosiones.src = 'sprites_explosiones.png';
    const imgSancho = new Image(); imgSancho.src = 'sprites_sancho.png';

    // --- COORDINADAS CORREGIDAS (Ajustadas para evitar recortes) ---
    const PLAYER_FRAMES = [{x: 10, y: 300, w: 290, h: 450}, {x: 310, y: 300, w: 290, h: 450}];
    const MOLINO_FRAME = {x: 700, y: 300, w: 300, h: 450}; // Área más grande para el molino
    const GIGANTE_FRAMES = {
        WALK1: {x: 0, y: 300, w: 250, h: 400}, 
        WALK2: {x: 250, y: 300, w: 250, h: 400},
        THROW: {x: 500, y: 300, w: 250, h: 400}, 
        BOSS: {x: 750, y: 300, w: 250, h: 400}
    };
    const EXPLOSION_FRAMES = [
        {x: 0, y: 280, w: 250, h: 280}, {x: 250, y: 280, w: 250, h: 280}, 
        {x: 500, y: 280, w: 250, h: 280}, {x: 750, y: 280, w: 250, h: 280}
    ];
    const SANCHO_FRAMES = {
        WAIT: {x: 0, y: 300, w: 260, h: 400}, 
        GIVE: {x: 500, y: 300, w: 260, h: 400},
        HEART: {x: 300, y: 340, w: 120, h: 120},
        BALSAMO: {x: 850, y: 400, w: 150, h: 200}
    };

    // --- ESTADO ---
    let currentState = 0, level = 1, score = 0, lives = 3, levelTimer = 0, animTick = 0;
    const keys = {};
    const player = { x: 400, y: 520, frame: 0 };
    const mills = [], projectiles = [], spears = [], explosions = [], hearts = [];
    let sancho = { x: -150, active: false, state: 'in' };
    let enemyDir = 1, cooldown = 0, quizIdx = 0, curQuiz = [], usedBalsamo = false;

    // --- BANCO PREGUNTAS ---
    const quizBank = [
        { q: "¿En qué ciudad nació Cervantes?", o: ["a) Madrid", "b) Sevilla", "c) Alcalá de Henares", "d) Toledo"], c: "KeyC" },
        { q: "¿Por qué es el 'Manco de Lepanto'?", o: ["a) Nació así", "b) Herida en batalla", "c) Prisión", "d) Apodo falso"], c: "KeyB" },
        { q: "¿Nombre real de Don Quijote?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
        { q: "¿Qué cree que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
        { q: "¿Nombre del caballo de don Quijote?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" }
    ];

    function drawSprite(img, f, x, y, s) {
        if(!img.complete) return;
        ctx.drawImage(img, f.x, f.y, f.w, f.h, x - (f.w*s)/2, y - (f.h*s)/2, f.w*s, f.h*s);
    }

    function startLevel(L) {
        level = L; lives = 3; levelTimer = 0; mills.length = 0;
        let rows = L === 1 ? 3 : 2;
        if(L === 3) mills.push({x:400, y:100, hp:20, boss:true, s:'walk'});
        for(let r=0; r<rows; r++) for(let c=0; c<7; c++) 
            mills.push({x: c*100+100, y: r*80+(L===3?220:80), hp:L, s:'walk'});
        currentState = 1;
    }

    function update() {
        if(currentState !== 1) return;
        animTick++; levelTimer++;

        if(keys['ArrowLeft'] && player.x > 50) { player.x -= 6; if(animTick%10===0) player.frame = 1-player.frame; }
        if(keys['ArrowRight'] && player.x < 750) { player.x += 6; if(animTick%10===0) player.frame = 1-player.frame; }

        let edge = false;
        mills.forEach(m => {
            if(!m.hp) return;
            if(!m.boss) { m.x += (1.5 + level*0.5) * enemyDir; if(m.x > 760 || m.x < 40) edge = true; }
            if(cooldown <= 0 && Math.random() < 0.006) {
                projectiles.push({x: m.x, y: m.y}); cooldown = 50;
            }
            spears.forEach((sp, i) => {
                if(Math.abs(sp.x - m.x) < 40 && Math.abs(sp.y - m.y) < 50) {
                    m.hp--; spears.splice(i,1);
                    if(m.hp<=0) { score += 100; explosions.push({x:m.x, y:m.y, f:0}); }
                }
            });
        });
        if(edge) { enemyDir *= -1; mills.forEach(m => { if(!m.boss) m.y += 20; }); }

        projectiles.forEach((p, i) => {
            p.y += 5;
            if(Math.hypot(p.x - player.x, p.y - player.y) < 30) {
                lives--; projectiles.splice(i,1);
                if(lives<=0) {
                    if(level===3 && !usedBalsamo) { currentState=5; curQuiz=quizBank.sort(()=>.5-Math.random()).slice(0,3); quizIdx=0; }
                    else currentState=2;
                }
            }
        });

        spears.forEach((s, i) => { s.y -= 8; if(s.y < 0) spears.splice(i,1); });
        explosions.forEach((e, i) => { if(animTick%6===0) e.f++; if(e.f>3) explosions.splice(i,1); });
        if(mills.filter(m=>m.hp>0).length === 0) currentState = level===3 ? 4 : 3;
        if(cooldown > 0) cooldown--;
    }

    function draw() {
        ctx.clearRect(0,0,800,600);
        ctx.fillStyle = "#fdf5e6"; ctx.fillRect(0,0,800,600); // Fondo papel

        if(currentState === 1) {
            drawSprite(imgQuijote, PLAYER_FRAMES[player.frame], player.x, player.y, 0.25);
            mills.forEach(m => {
                if(m.hp <= 0) return;
                let img = (level === 1 && !m.boss) ? imgQuijote : imgGigantes;
                let frame = (level === 1 && !m.boss) ? MOLINO_FRAME : (animTick%20>10 ? GIGANTE_FRAMES.WALK1 : GIGANTE_FRAMES.WALK2);
                drawSprite(img, frame, m.x, m.y, m.boss ? 0.6 : 0.22);
            });
            explosions.forEach(e => drawSprite(imgExplosiones, EXPLOSION_FRAMES[e.f], e.x, e.y, 0.5));
            spears.forEach(s => { ctx.fillStyle = "#5d4037"; ctx.fillRect(s.x-2, s.y, 4, 30); });
            projectiles.forEach(p => { ctx.fillStyle = "#333"; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill(); });
            
            ctx.fillStyle = "#3e2723"; ctx.font = "bold 20px Georgia";
            ctx.fillText(`Gloria: ${score}  Honor: ${"♥".repeat(lives)}`, 20, 40);
        } else if(currentState === 5) {
            ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,800,600);
            ctx.fillStyle = "white"; ctx.textAlign = "center";
            ctx.fillText("¿MERECES EL BÁLSAMO DE FIERABRÁS?", 400, 100);
            let q = curQuiz[quizIdx];
            ctx.fillText(q.q, 400, 300);
            q.o.forEach((o, i) => ctx.fillText(o, 400, 350 + i*30));
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,600);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "30px Georgia";
            let t = ["MENÚ: CLIC PARA EMPEZAR", "", "GESTA INTERRUMPIDA", "¡NIVEL SUPERADO!", "¡VICTORIA FINAL!"][currentState];
            ctx.fillText(t, 400, 300);
        }
        requestAnimationFrame(draw);
    }

    window.onkeydown = e => {
        keys[e.code] = true;
        if(currentState === 5) {
            if(e.code === curQuiz[quizIdx].c) { quizIdx++; if(quizIdx>=3) { lives=3; usedBalsamo=true; currentState=1; }}
            else if(["KeyA","KeyB","KeyC","KeyD"].includes(e.code)) currentState = 2;
        }
        if(e.code === 'Space' && currentState === 1) spears.push({x: player.x, y: player.y-40});
    };
    window.onkeyup = e => keys[e.code] = false;
    canvas.onclick = () => { 
        if(currentState === 0 || currentState === 3) startLevel(currentState===3?level+1:1);
        if(currentState === 2 || currentState === 4) location.reload();
    };

    setInterval(update, 1000/60);
    draw();
</script>
</body>
</html>
