<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: El Rescate de Dulcinea</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Georgia', serif; overflow: hidden; }
        canvas { background: #f4e4bc; border: 8px solid #5d4037; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        #ui-layer { position: absolute; pointer-events: none; color: #3e2723; text-align: center; width: 800px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- CARGA DE ASSETS (PNG con Transparencia) ---
    const imgQ = new Image(); imgQ.src = 'sprites_quijote.png';
    const imgM = new Image(); imgM.src = 'sprites_molinos.png'; // ¡Reutilizando tu spritesheet 2x2!
    const imgG = new Image(); imgG.src = 'sprites_gigantes.png';
    const imgS = new Image(); imgS.src = 'sprites_sancho.png';

    // --- BANCO DE PREGUNTAS (EL BÁLSAMO DE FIERABRÁS) ---
    const quizBank = [
        { q: "¿En qué ciudad nació Cervantes?", o: ["a) Madrid", "b) Sevilla", "c) Alcalá de Henares", "d) Toledo"], c: "KeyC" },
        { q: "¿Por qué es el 'Manco de Lepanto'?", o: ["a) Nació así", "b) Herida en batalla", "c) Prisión", "d) Apodo falso"], c: "KeyB" },
        { q: "¿Nombre real de Don Quijote?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
        { q: "¿Qué cree que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
        { q: "¿Nombre del caballo de don Quijote?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" },
        { q: "¿En qué año se publica la 1.ª parte del Quijote?", o: ["a) 1605", "b) 1610", "c) 1615", "d) 1620"], c: "KeyA" },
        { q: "¿En qué año se publica la 2.ª parte del Quijote?", o: ["a) 1605", "b) 1610", "c) 1615", "d) 1620"], c: "KeyC" },
        { q: "¿Cuál no es una obra de Cervantes?", o: ["a) Los trabajos de Persiles y Segismunda", "b) Viaje del Parnaso", "c) Las novelas ejemplares", "d) La vida es sueño"], c: "KeyD" },
        { q: "¿Dónde sufre cautiverio Cervantes?", o: ["a) Estambul", "b) Argel", "c) Marraquech", "d) El Cairo"], c: "KeyB" },
        { q: "¿De dónde es Dulcinea, la amada de don Quijote?", o: ["a) Del Toboso", "b) De Toledo", "c) De Belmonte", "d) Guadalajara"], c: "KeyA" }
    ];

    // --- VARIABLES DE ESTADO Y JUEGO ---
    let state = 'START'; // START, PLAY, SUMMARY, TRIVIA, WIN, GAMEOVER
    let level = 1;
    let lives = 3;
    let timer = 0;
    let frame = 0;
    let currentQuiz = [];
    let quizIndex = 0;
    let hasBalsamUsed = false; // Solo permite el bálsamo una vez

    // Coordenadas fijas para recortes (W, H)
    const FRAME_W = 200;
    const FRAME_H = 250;

    // Entidades
    let q = { x: 100, y: 300, w: 80, h: 100, speed: 5, facingRight: true, power: false };
    let enemies = [];
    let spears = [];
    let sancho = { x: -100, y: 450, state: 'HIDDEN', targetX: 100 };
    let item = { x: 0, y: 0, active: false, type: '', timer: 0 };
    let keys = {};

    // --- CONTROLES ---
    window.onkeydown = (e) => {
        keys[e.code] = true;
        // Iniciar nivel o continuar desde resumen
        if ((state === 'START' || state === 'SUMMARY') && (e.code === 'Space' || e.code === 'Enter')) startLevel();
        // Responder trivia
        if (state === 'TRIVIA') checkTrivia(e.code);
    };
    window.onkeyup = (e) => keys[e.code] = false;

    // --- LÓGICA DE NIVELES ---
    function startLevel() {
        if (state === 'SUMMARY') level++;
        if (level > 3) return; // Ya no debería pasar
        
        state = 'PLAY';
        enemies = [];
        spears = [];
        timer = 0;
        sancho.state = 'HIDDEN'; // Reset Sancho
        item.active = false;
        
        if (level === 1) spawnEnemies(5, 'mill', 1);
        if (level === 2) spawnEnemies(6, 'giant', 2); // Gigantes con 2 HP
        if (level === 3) {
            enemies.push({ x: 600, y: 200, w: 150, h: 200, hp: 25, type: 'boss', sTimer: 0 });
        }
    }

    function spawnEnemies(count, type, hp) {
        for(let i=0; i<count; i++) {
            enemies.push({ x: 400 + i*150, y: 150 + Math.random()*250, w: 80, h: 100, hp: hp, type: type, speed: type === 'giant' ? 1 : 0 });
        }
    }

    // --- BUCLE PRINCIPAL (LÓGICA) ---
    function update() {
        if (state !== 'PLAY') return;
        frame++;
        timer++;

        // Movimiento Don Quijote
        if (keys['ArrowRight']) { q.x += q.speed; q.facingRight = true; }
        if (keys['ArrowLeft']) { q.x -= q.speed; q.facingRight = false; }
        if (keys['ArrowUp']) q.y -= q.speed;
        if (keys['ArrowDown']) q.y += q.speed;
        // Disparo (cada 20 frames para no "spam")
        if (keys['Space'] && frame % 20 === 0) fireSpear();

        // Límites de pantalla para Quijote
        q.x = Math.max(0, Math.min(canvas.width - q.w, q.x));
        q.y = Math.max(150, Math.min(canvas.height - q.h, q.y)); // Mantener sobre suelo

        // Gestión de Sancho Panza y Ayudas (Nivel 2 y 3)
        if (level >= 2 && sancho.state === 'HIDDEN' && Math.random() < 0.003) sancho.state = 'IN';
        if (sancho.state === 'IN') {
            sancho.x += 2;
            if (sancho.x >= sancho.targetX) { dropItem(); sancho.state = 'OUT'; }
        } else if (sancho.state === 'OUT') {
            sancho.x -= 2;
            if (sancho.x < -100) sancho.state = 'HIDDEN';
        }

        // Lógica de Ayuda/Item (Corazón o Lanza)
        if (item.active) {
            item.timer--;
            // Colisión con el ítem
            if (hit(q, item)) {
                if (item.type === 'HEART') lives++;
                else { q.power = true; setTimeout(() => q.power = false, 5000); } // 5s de poder
                item.active = false;
            }
            if (item.timer <= 0) item.active = false; // Desaparece tras 3 seg
        }

        // Enemigos y Boss
        enemies.forEach((e, index) => {
            if (e.type === 'giant') e.x -= e.speed;
            
            // Megagigante (Boss Nivel 3): Invocar pequeños gigantes
            if (e.type === 'boss') {
                e.sTimer++;
                if (e.sTimer > 200) { // Invocar cada ~3.3 seg
                    enemies.push({ x: e.x, y: e.y + 100, w: 60, h: 80, hp: 1, type: 'giant', speed: 2 });
                    e.sTimer = 0;
                }
            }

            // Colisión Quijote contra enemigo
            if (hit(q, e) && e.hp > 0) { 
                lives--; 
                checkDeath();
                // Opcional: invulnerabilidad temporal o retroceso
            }
        });

        // Proyectiles (Lanzas)
        spears.forEach((s, si) => {
            s.x += 12; // Velocidad lanza
            if (s.x > canvas.width) spears.splice(si, 1); // Eliminar fuera

            enemies.forEach((e, ei) => {
                if (hit(s, e) && e.hp > 0) {
                    e.hp--;
                    spears.splice(si, 1);
                    // Si el enemigo muere, el loop principal de draw() se encargará de mostrar la explosión
                    // Opcional: retrasar la eliminación del array enemies para mostrar explosión completa.
                    if (e.hp <= 0 && e.type !== 'boss') {
                        // Para simplificar, eliminamos de inmediato. 
                        // Tu código de draw() no mostrará los molinos con hp=0.
                        enemies.splice(ei, 1); 
                        score += (level * 10);
                    } else if (e.hp <= 0 && e.type === 'boss') {
                        enemies.splice(ei, 1);
                        state = 'WIN'; // Victoria definitiva
                    }
                }
            });
        });

        // Verificar Victoria de Nivel (No boss)
        if (level < 3 && enemies.length === 0) state = 'SUMMARY';
    }

    function fireSpear() {
        let lanceW = 30, lanceH = 10;
        spears.push({ x: q.x + q.w, y: q.y + q.h/2, w: lanceW, h: lanceH });
        // Lanza triple si tiene powermode
        if (q.power) {
            spears.push({ x: q.x + q.w, y: q.y + q.h/2 - 20, w: lanceW, h: lanceH });
            spears.push({ x: q.x + q.w, y: q.y + q.h/2 + 20, w: lanceW, h: lanceH });
        }
    }

    function dropItem() {
        item = { x: sancho.x + 50, y: sancho.y, active: true, type: Math.random() > 0.5 ? 'HEART' : 'SPEAR', timer: 180, w: 30, h: 30 };
    }

    function checkDeath() {
        if (lives <= 0) {
            // Activar trivia solo en Nivel 3 y una vez
            if (level === 3 && !hasBalsamUsed) {
                currentQuiz = quizBank.sort(() => 0.5 - Math.random()).slice(0, 3);
                quizIndex = 0;
                state = 'TRIVIA';
            } else {
                state = 'GAMEOVER';
            }
        }
    }

    // Lógica de Trivia (A=KeyA, B=KeyB, etc.)
    function checkTrivia(keyCode) {
        if (keyCode === currentQuiz[quizIndex].c) {
            quizIndex++;
            if (quizIndex >= 3) { 
                lives = 1; // Resucita con 1 vida
                hasBalsamUsed = true; 
                state = 'PLAY'; 
            }
        } else {
            // Respuesta incorrecta
            state = 'GAMEOVER';
        }
    }

    // Utilidad de colisión (AABB simple)
    function hit(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // --- RENDERIZADO (DIBUJO) ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Suelo de La Mancha (un simple gradiente o color plano)
        ctx.fillStyle = '#eec988';
        ctx.fillRect(0, 150, canvas.width, canvas.height - 150);

        // --- Dibujar Don Quijote (CON ESPEJO) ---
        // Asignamos coordenadas de recorte basadas en la animación (fila 0 esperada para trote)
        let qAnim = Math.floor(frame / 10) % 2; // Alternar frames 0 y 1

        ctx.save();
        if (!q.facingRight) { 
            // Truco del espejo: mover el contexto al borde del sprite, escalar al revés
            ctx.translate(q.x + q.w, 0); 
            ctx.scale(-1, 1); 
            // Dibujamos en origen 0 (ya trasladado)
            ctx.drawImage(imgQ, qAnim * FRAME_W, 0, FRAME_W, FRAME_H, 0, q.y, q.w, q.h); 
        } else { 
            // Dibujo normal a la derecha
            ctx.drawImage(imgQ, qAnim * FRAME_W, 0, FRAME_W, FRAME_H, q.x, q.y, q.w, q.h); 
        }
        ctx.restore();

        // --- Enemigos ---
        enemies.forEach(e => {
            if (e.type === 'mill') {
                // --- LÓGICA ESPECÍFICA PARA CUADRÍCULA 2x2 (image_10.png) ---
                // Fila 0 = Molino vivo. Columna = Animación (Giro).
                let millAnim = Math.floor(frame / 30) % 2; // Giro lento alternando col 0 y 1
                ctx.drawImage(imgM, millAnim * FRAME_W, 0, FRAME_W, FRAME_H, e.x, e.y, e.w, e.h);
            
            } else if (e.type === 'giant' || e.type === 'boss') {
                // Gigantes y Boss (Franja horizontal de 4 frames esperada en imgG)
                // Columna = Animación
                let gAnim = Math.floor(frame / 15) % 4; 
                ctx.drawImage(imgG, gAnim * FRAME_W, 0, FRAME_W, FRAME_H, e.x, e.y, e.w, e.h);
            }
        });

        // --- Sancho Panza ---
        if (sancho.state !== 'HIDDEN') {
            // Franja horizontal esperada: frame 0 caminando, frame 1 lanzando
            let sAnim = sancho.state === 'IN' ? Math.floor(frame / 10) % 2 : 1;
            ctx.drawImage(imgS, sAnim * FRAME_W, 0, FRAME_W, FRAME_H, sancho.x, sancho.y, 80, 100);
        }
        
        // --- Ítem de Ayuda (Corazón/Lanza) ---
        if (item.active) {
            // Efecto de parpadeo al final
            if (item.timer > 60 || (item.timer <= 60 && frame % 10 < 5)) {
                ctx.fillStyle = item.type === 'HEART' ? 'red' : 'gold';
                ctx.beginPath(); ctx.arc(item.x + item.w/2, item.y + item.h/2, 15, 0, Math.PI*2); ctx.fill();
            }
        }

        // --- Proyectiles (Lanzas) ---
        ctx.fillStyle = q.power ? 'gold' : 'brown';
        spears.forEach(s => ctx.fillRect(s.x, s.y, s.w, s.h));

        // --- INTERFAZ (UI) PRINCIPAL ---
        ctx.fillStyle = '#3e2723';
        ctx.textAlign = 'left';
        ctx.font = 'bold 22px Georgia';
        ctx.fillText(` Honor (Vidas): ${lives} `, 20, 30);
        ctx.textAlign = 'right';
        ctx.fillText(` Nivel: ${level} / 3 `, canvas.width - 20, 30);

        // --- PANTALLAS DE ESTADO (OVERLAYS) ---
        if (state === 'START') {
            overlay("DON QUIJOTE: EL RESCATE DE DULCINEA", 
                    "¡Voto a bríos, hidalgo! Frestón ha raptado a Dulcinea.\n" +
                    "INSTRUCCIONES DE MANEJO:\n\n" +
                    "FLECHAS: Moverse | ESPACIO: Lanzar Lanza\n\n" +
                    "[Pulsa ESPACIO o ENTER para cabalgar]");
        } else if (state === 'SUMMARY') {
            let timeBonus = Math.max(0, 1000 - timer);
            score += timeBonus;
            overlay(`¡NIVEL ${level} SUPERADO!`, 
                    `Honor conservado: ${lives}\nPresteza (Bonus Tiempo): ${timeBonus}\n\nPuntuación Total: ${score}\n\n[Pulsa para continuar al siguiente reto]`);
        } else if (state === 'GAMEOVER') {
            overlay("DERROTADO", 
                    "Tu honor ha caído en el campo de batalla.\nFrestón se regocija y Dulcinea llora.\n\n[Pulsa F5 para reintentar]");
        } else if (state === 'WIN') {
            overlay("¡VICTORIA ÉPICA!", 
                    "¡Has rescatado a tu enamorada Dulcinea de las manos de Frestón!\n" +
                    "La Mancha celebra tu honor y presteza.\n\nPuntuación Final: ${score}\n\n[¡Felicidades, Caballero!]");
        } else if (state === 'TRIVIA') {
            let cur = currentQuiz[quizIndex];
            overlay("EL BÁLSAMO DE FIERABRÁS", 
                    "¡Has caído! Demuestra tus conocimientos para resucitar.\nPregunta ${quizIndex+1} / 3:\n\n" +
                    `${cur.q}\n\n` +
                    `${cur.o.join('  ')}\n\n` +
                    "Responde pulsando la tecla [A], [B], [C] o [D]");
        }

        // --- BUCLE DE ANIMACIÓN ---
        requestAnimationFrame(() => { update(); draw(); });
    }

    // Utilidad para dibujar overlays de texto
    function overlay(title, sub) {
        ctx.fillStyle = 'rgba(244, 228, 188, 0.9)'; // Fondo pergamino semitransparente
        ctx.fillRect(50, 100, 700, 400);
        ctx.fillStyle = '#3e2723';
        ctx.textAlign = 'center';
        
        ctx.font = 'bold 44px Georgia';
        ctx.fillText(title, 400, 170);
        
        ctx.font = '22px Georgia';
        let lines = sub.split('\n');
        lines.forEach((l, i) => ctx.fillText(l, 400, 230 + i*35));
    }

    // --- INICIO DEL JUEGO ---
    // Aseguramos que las imágenes estén cargadas antes del primer frame (aunque draw() ya maneja esto)
    draw();

    </script>
</body>
</html>
