<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: Gesta y Bravura</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Georgia', serif; }
        canvas { border: 5px solid #8d6e63; background: #fdf5e6; image-rendering: pixelated; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 600;

// --- ASSETS ---
const imgQ = new Image(); imgQ.src = 'sprites_quijote.png';
const imgG = new Image(); imgG.src = 'sprites_gigantes.png';
const imgE = new Image(); imgE.src = 'sprites_explosiones.png';
const imgS = new Image(); imgS.src = 'sprites_sancho.png';

const SPRITES = {
    quijote: [{x:40, y:330, w:220, h:360}, {x:360, y:330, w:220, h:360}],
    molino: {x:730, y:330, w:250, h:380},
    gigante: [{x:20, y:320, w:220, h:380}, {x:270, y:320, w:220, h:380}],
    sancho: {x:20, y:350, w:220, h:350},
    corazon: {x:320, y:350, w:80, h:80},
    balsamo: {x:880, y:440, w:120, h:150},
    expl: [{x:0, y:280, w:250, h:280}, {x:250, y:280, w:250, h:280}, {x:500, y:280, w:250, h:280}, {x:750, y:280, w:250, h:280}]
};

const quizBank = [
    { q: "¿En qué ciudad nació Cervantes?", o: ["a) Madrid", "b) Sevilla", "c) Alcalá de Henares", "d) Toledo"], c: "KeyC" },
    { q: "¿Por qué es el 'Manco de Lepanto'?", o: ["a) Nació así", "b) Herida en batalla", "c) Prisión", "d) Apodo falso"], c: "KeyB" },
    { q: "¿Nombre real de Don Quijote?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
    { q: "¿Qué cree que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
    { q: "¿Nombre del caballo de don Quijote?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" }
];

// --- ESTADO ---
let state = 'MENU', level = 1, score = 0, totalScore = 0, lives = 3;
let anim = 0, levelTimer = 0, lastBonos = { vidas: 0, tiempo: 0 };
let player = { x: 400, y: 540, frame: 0, powerUp: false };
let enemies = [], spears = [], projs = [], expls = [], hearts = [], upgrades = [];
let sancho = { x: -150, active: false, timer: 0 };
let enemyDir = 1, cooldown = 0, killCount = 0, quizIdx = 0, curQuiz = [], usedBalsamo = false;
const keys = {};

function startLevel(L) {
    level = L; lives = 3; enemies = []; spears = []; projs = []; expls = []; hearts = []; upgrades = [];
    killCount = 0; levelTimer = 0; player.powerUp = false; player.x = 400;
    
    let rows = (L === 1) ? 3 : 2;
    if(L === 3) enemies.push({x:400, y:120, hp:25, boss:true, r:0});
    for(let r=0; r<rows; r++) {
        for(let c=0; c<7; c++) {
            enemies.push({x: c*100+100, y: r*80 + (L===3?240:80), hp:L, boss:false, r:0});
        }
    }
    state = 'PLAYING';
}

function update() {
    if(state !== 'PLAYING') return;
    anim++; levelTimer++;
    if(cooldown > 0) cooldown--;

    // Movimiento (CORREGIDO IZQUIERDA)
    if(keys['ArrowLeft'] && player.x > 50) { 
        player.x -= 6; 
        if(anim % 10 === 0) player.frame = 1 - player.frame; 
    }
    if(keys['ArrowRight'] && player.x < 750) { 
        player.x += 6; 
        if(anim % 10 === 0) player.frame = 1 - player.frame; 
    }

    // Sancho Panza Curación
    if(!sancho.active && Math.random() < 0.002) { sancho.active = true; sancho.x = -100; }
    if(sancho.active) {
        sancho.x += 2;
        if(anim % 100 === 0) hearts.push({x: sancho.x, y: 520});
        if(sancho.x > 900) sancho.active = false;
    }
    hearts.forEach((h, i) => {
        if(Math.hypot(h.x - player.x, h.y - player.y) < 40) { lives = Math.min(lives + 1, 5); hearts.splice(i, 1); }
    });

    // Enemigos
    let edge = false;
    enemies.forEach(e => {
        if(e.hp <= 0) return;
        if(!e.boss) { e.x += (1.2 + level*0.3) * enemyDir; if(e.x > 760 || e.x < 40) edge = true; }
        e.r += 0.05; // Rotación aspas
        if(Math.random() < 0.005 && cooldown <= 0) { projs.push({x:e.x, y:e.y}); cooldown = 45; }
        if(e.y > 510) state = 'GAMEOVER';
    });
    if(edge) { enemyDir *= -1; enemies.forEach(e => { if(!e.boss) e.y += 20; }); }

    // Lanzas y Mejora (Nivel 2+)
    spears.forEach((s, si) => {
        s.y -= 10;
        enemies.forEach(e => {
            if(e.hp > 0 && Math.abs(s.x - e.x) < 40 && Math.abs(s.y - e.y) < 50) {
                e.hp--; spears.splice(si, 1);
                if(e.hp <= 0) { 
                    score += 100; killCount++;
                    expls.push({x:e.x, y:e.y, f:0});
                    if(level >= 2 && killCount === 2) upgrades.push({x:e.x, y:e.y}); 
                }
            }
        });
    });

    upgrades.forEach((u, i) => { 
        u.y += 2; 
        if(Math.hypot(u.x-player.x, u.y-player.y) < 40) { player.powerUp = true; upgrades.splice(i,1); }
    });

    projs.forEach((p, pi) => {
        p.y += 5;
        if(Math.hypot(p.x-player.x, p.y-player.y) < 30) { 
            lives--; projs.splice(pi,1); 
            if(lives <= 0) {
                if(level === 3 && !usedBalsamo) { state = 'QUIZ'; curQuiz = quizBank.sort(()=>.5-Math.random()).slice(0,3); quizIdx = 0; }
                else state = 'GAMEOVER';
            }
        }
    });

    expls.forEach((ex, i) => { if(anim%6===0) ex.f++; if(ex.f > 3) expls.splice(i,1); });

    if(enemies.filter(e=>e.hp > 0).length === 0) {
        lastBonos.vidas = lives * 500;
        lastBonos.tiempo = Math.max(0, 2000 - Math.floor(levelTimer/10));
        totalScore += score + lastBonos.vidas + lastBonos.tiempo;
        state = 'SUMMARY';
    }
}

function draw() {
    ctx.fillStyle = "#fdf5e6"; ctx.fillRect(0,0,800,600);

    if(state === 'PLAYING') {
        if(sancho.active) drawSprite(imgS, SPRITES.sancho, sancho.x, 540, 0.2);
        hearts.forEach(h => drawSprite(imgS, SPRITES.corazon, h.x, h.y, 0.3));
        drawSprite(imgQ, SPRITES.quijote[player.frame], player.x, player.y, 0.18);

        enemies.forEach(e => {
            if(e.hp <= 0) return;
            if(level === 1 && !e.boss) {
                ctx.save(); ctx.translate(e.x, e.y);
                drawSprite(imgQ, SPRITES.molino, 0, 0, 0.18);
                ctx.rotate(e.r); ctx.fillStyle = "#5d4037"; ctx.fillRect(-35, -4, 70, 8); ctx.fillRect(-4, -35, 8, 70);
                ctx.restore();
            } else {
                drawSprite(imgG, SPRITES.gigante[anim%20>10?1:0], e.x, e.y, e.boss ? 0.6 : 0.2);
            }
        });

        expls.forEach(ex => drawSprite(imgE, SPRITES.expl[ex.f], ex.x, ex.y, 0.5));
        upgrades.forEach(u => { ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(u.x, u.y, 12, 0, 7); ctx.fill(); });
        spears.forEach(s => { ctx.fillStyle = player.powerUp ? "red" : "brown"; ctx.fillRect(s.x-2, s.y, 4, 25); });
        projs.forEach(p => { ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(p.x, p.y, 7, 0, 7); ctx.fill(); });

        ctx.fillStyle = "#3e2723"; ctx.font = "bold 18px Georgia";
        ctx.fillText(`Gloria: ${score}  Honor: ${"♥".repeat(lives)}`, 20, 30);
    } else if(state === 'SUMMARY') {
        ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,800,600);
        ctx.fillStyle = "white"; ctx.textAlign = "center";
        ctx.font = "30px Georgia"; ctx.fillText("¡GESTA FINALIZADA!", 400, 200);
        ctx.font = "20px Georgia";
        ctx.fillText(`Bono Honor (Vidas): +${lastBonos.vidas}`, 400, 260);
        ctx.fillText(`Bono Presteza (Tiempo): +${lastBonos.tiempo}`, 400, 300);
        ctx.fillStyle = "gold"; ctx.fillText(`GLORIA TOTAL: ${totalScore}`, 400, 360);
        ctx.fillStyle = "white"; ctx.fillText("HAZ CLIC PARA CONTINUAR", 400, 450);
    } else if(state === 'MENU') {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,600);
        ctx.fillStyle = "white"; ctx.textAlign = "center";
        ctx.font = "35px Georgia"; ctx.fillText("DON QUIJOTE: EL VIDEOJUEGO", 400, 200);
        ctx.font = "18px Georgia";
        ctx.fillText("INSTRUCCIONES:", 400, 280);
        ctx.fillText("Flechas IZQ/DER para moverte", 400, 320);
        ctx.fillText("Espacio para lanzar la lanza", 400, 350);
        ctx.font = "bold 22px Georgia"; ctx.fillText("CLIC PARA EMPEZAR LA AVENTURA", 400, 450);
    } else if(state === 'QUIZ') {
        ctx.fillStyle = "black"; ctx.fillRect(0,0,800,600);
        ctx.fillStyle = "white"; ctx.textAlign = "center";
        let q = curQuiz[quizIdx];
        ctx.fillText(q.q, 400, 200);
        q.o.forEach((o, i) => ctx.fillText(o, 400, 260 + i*40));
    } else {
        ctx.fillStyle = "black"; ctx.fillRect(0,0,800,600);
        ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText("GAME OVER - CLIC PARA REINTENTAR", 400, 300);
    }
}

function drawSprite(img, f, x, y, s) {
    if(!img.complete) return;
    ctx.drawImage(img, f.x, f.y, f.w, f.h, x-(f.w*s)/2, y-(f.h*s)/2, f.w*s, f.h*s);
}

window.onkeydown = e => {
    keys[e.code] = true;
    if(state === 'QUIZ') {
        if(e.code === curQuiz[quizIdx].c) { quizIdx++; if(quizIdx>=3){ lives=3; usedBalsamo=true; state='PLAYING'; }}
        else if(["KeyA","KeyB","KeyC","KeyD"].includes(e.code)) state = 'GAMEOVER';
    }
    if(e.code === 'Space' && state === 'PLAYING') {
        spears.push({x:player.x, y:player.y-20});
        if(player.powerUp) { spears.push({x:player.x-20, y:player.y-20}, {x:player.x+20, y:player.y-20}); }
    }
};
window.onkeyup = e => keys[e.code] = false;
canvas.onclick = () => {
    if(state === 'MENU') startLevel(1);
    else if(state === 'SUMMARY') {
        if(level < 3) startLevel(level + 1);
        else state = 'WIN';
    }
    else if(state === 'GAMEOVER' || state === 'WIN') location.reload();
};

setInterval(() => { update(); draw(); }, 1000/60);
</script>
</body>
</html>
