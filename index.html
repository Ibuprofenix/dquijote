<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: Gesta y Bravura</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        canvas { border: 5px solid #8d6e63; background: #fdf5e6; image-rendering: pixelated; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 600;

// --- ASSETS ---
const imgQ = new Image(); imgQ.src = 'sprites_quijote.png';
const imgG = new Image(); imgG.src = 'sprites_gigantes.png';
const imgE = new Image(); imgE.src = 'sprites_explosiones.png';
const imgS = new Image(); imgS.src = 'sprites_sancho.png';

// Coordenadas refinadas (centradas en el dibujo)
const SPRITES = {
    quijote: [{x:40, y:330, w:220, h:360}, {x:360, y:330, w:220, h:360}],
    molino: {x:730, y:330, w:250, h:380},
    gigante: [{x:20, y:320, w:220, h:380}, {x:270, y:320, w:220, h:380}],
    sancho: {x:20, y:350, w:220, h:350},
    corazon: {x:320, y:350, w:80, h:80},
    balsamo: {x:880, y:440, w:120, h:150}
};

const quizBank = [
    { q: "¿En qué ciudad nació Cervantes?", o: ["a) Madrid", "b) Sevilla", "c) Alcalá de Henares", "d) Toledo"], c: "KeyC" },
    { q: "¿Por qué es el 'Manco de Lepanto'?", o: ["a) Nació así", "b) Herida en batalla", "c) Prisión", "d) Apodo falso"], c: "KeyB" },
    { q: "¿Nombre real de Don Quijote?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
    { q: "¿Qué cree que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
    { q: "¿Nombre del caballo de don Quijote?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" },
    { q: "¿En qué año se publica la 1.ª parte del Quijote?", o: ["a) 1605", "b) 1610", "c) 1615", "d) 1620"], c: "KeyA" },
    { q: "¿En qué año se publica la 2.ª parte del Quijote?", o: ["a) 1605", "b) 1610", "c) 1615", "d) 1620"], c: "KeyC" },
    { q: "¿Cuál no es una obra de Cervantes?", o: ["a) Los trabajos de Persiles y Segismunda", "b) Viaje del Parnaso", "c) Las novelas ejemplares", "d) La vida es sueño"], c: "KeyD" },
    { q: "¿Dónde sufre cautiverio Cervantes?", o: ["a) Estambul", "b) Argel", "c) Marraquech", "d) El Cairo"], c: "KeyB" },
    { q: "¿De dónde es Dulcinea, la amada de don Quijote?", o: ["a) Del Toboso", "b) De Toledo", "c) De Belmonte", "d) Guadalajara"], c: "KeyA" }
];

// --- VARIABLES DE ESTADO ---
let state = 'MENU', level = 1, score = 0, lives = 3, anim = 0, levelTimer = 0;
let player = { x: 400, y: 540, f: 0, powerUp: false };
let enemies = [], spears = [], projs = [], expls = [], hearts = [], upgrades = [];
let enemyDir = 1, cooldown = 0, killCount = 0, quizIdx = 0, curQuiz = [], usedBalsamo = false;
const keys = {};

function startLevel(L) {
    level = L; lives = 3; enemies = []; spears = []; projs = []; killCount = 0; levelTimer = 0;
    let rows = L === 1 ? 3 : 2;
    if(L === 3) enemies.push({x:400, y:120, hp:25, boss:true, r:0});
    for(let r=0; r<rows; r++) for(let c=0; c<7; c++) 
        enemies.push({x: c*100+100, y: r*80 + (L===3?240:80), hp:L, boss:false, r:0});
    state = 'PLAYING';
}

function update() {
    if(state !== 'PLAYING') return;
    anim++; levelTimer++;
    if(cooldown > 0) cooldown--;

    // Movimiento (AHORA SÍ IZQUIERDA Y DERECHA)
    if(keys['ArrowLeft'] && player.x > 50) { player.x -= 6; if(anim%10===0) player.frame = 1-player.frame; }
    if(keys['ArrowRight'] && player.x < 750) { player.x += 6; if(anim%10===0) player.frame = 1-player.frame; }

    // Enemigos y Aspas
    let edge = false;
    enemies.forEach(e => {
        if(e.hp <= 0) return;
        if(!e.boss) { e.x += (1 + level*0.5) * enemyDir; if(e.x > 760 || e.x < 40) edge = true; }
        e.r += 0.05; // Rotación de aspas
        if(Math.random() < 0.005 && cooldown <= 0) { projs.push({x:e.x, y:e.y}); cooldown = 40; }
        if(e.y > 500) state = 'GAMEOVER'; // Invasión
    });
    if(edge) { enemyDir *= -1; enemies.forEach(e => { if(!e.boss) e.y += 20; }); }

    // Lanzas y Mejora de Arma
    spears.forEach((s, si) => {
        s.y -= 10;
        enemies.forEach(e => {
            if(e.hp > 0 && Math.abs(s.x - e.x) < 40 && Math.abs(s.y - e.y) < 50) {
                e.hp--; spears.splice(si, 1);
                if(e.hp <= 0) { 
                    score += 100; killCount++;
                    expls.push({x:e.x, y:e.y, f:0});
                    if(killCount === 3) upgrades.push({x:e.x, y:e.y}); // MEJORA AL 3er GIGANTE
                }
            }
        });
    });

    // Recoger PowerUp y Corazones
    upgrades.forEach((u, i) => { u.y += 2; if(Math.hypot(u.x-player.x, u.y-player.y)<40){ player.powerUp = true; upgrades.splice(i,1); }});
    
    // Proyectiles Enemigos
    projs.forEach((p, pi) => {
        p.y += 5;
        if(Math.hypot(p.x-player.x, p.y-player.y)<30){ lives--; projs.splice(pi,1); if(lives<=0) triggerBalsamo(); }
    });

    if(enemies.filter(e=>e.hp>0).length === 0) state = level === 3 ? 'WIN' : 'LEVEL_UP';
}

function triggerBalsamo() {
    if(level === 3 && !usedBalsamo) {
        state = 'QUIZ'; curQuiz = quizBank.sort(()=>0.5-Math.random()).slice(0,3); quizIdx = 0;
    } else state = 'GAMEOVER';
}

function draw() {
    ctx.fillStyle = "#fdf5e6"; ctx.fillRect(0,0,800,600);
    if(state === 'PLAYING') {
        // Quijote (Más pequeño para que se vea el caballo)
        drawSprite(imgQ, SPRITES.quijote[player.frame || 0], player.x, player.y, 0.2);

        enemies.forEach(e => {
            if(e.hp <= 0) return;
            if(level === 1 && !e.boss) { // Molino giratorio
                ctx.save(); ctx.translate(e.x, e.y);
                drawSprite(imgQ, SPRITES.molino, 0, 0, 0.18);
                ctx.rotate(e.r); ctx.fillStyle = "#5d4037"; ctx.fillRect(-40, -5, 80, 10); ctx.fillRect(-5, -40, 10, 80);
                ctx.restore();
            } else {
                drawSprite(imgG, SPRITES.gigante[anim%20>10?1:0], e.x, e.y, e.boss ? 0.6 : 0.2);
            }
        });

        upgrades.forEach(u => { ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(u.x, u.y, 15, 0, 7); ctx.fill(); ctx.stroke(); });
        spears.forEach(s => { ctx.fillStyle = player.powerUp ? "orange" : "brown"; ctx.fillRect(s.x-2, s.y, 4, 30); });
        projs.forEach(p => { ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill(); });

        ctx.fillStyle = "#3e2723"; ctx.font = "20px Georgia";
        ctx.fillText(`Gloria: ${score}  Vidas: ${"♥".repeat(lives)}`, 20, 40);
        if(player.powerUp) ctx.fillText("¡LANZA REFORZADA!", 600, 40);
    } else if(state === 'QUIZ') {
        ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,800,600);
        ctx.fillStyle = "white"; ctx.textAlign = "center";
        ctx.fillText("BÁLSAMO DE FIERABRÁS: " + curQuiz[quizIdx].q, 400, 200);
        curQuiz[quizIdx].o.forEach((o, i) => ctx.fillText(o, 400, 260 + i*40));
    } else {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,600);
        ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.fillText(state + ". Clic para continuar", 400, 300);
    }
}

function drawSprite(img, f, x, y, s) {
    if(!img.complete) return;
    ctx.drawImage(img, f.x, f.y, f.w, f.h, x-(f.w*s)/2, y-(f.h*s)/2, f.w*s, f.h*s);
}

window.onkeydown = e => {
    keys[e.code] = true;
    if(state === 'QUIZ') {
        if(e.code === curQuiz[quizIdx].c) { quizIdx++; if(quizIdx>=3){ lives=3; usedBalsamo=true; state='PLAYING'; }}
        else if(["KeyA","KeyB","KeyC","KeyD"].includes(e.code)) state = 'GAMEOVER';
    }
    if(e.code === 'Space' && state === 'PLAYING') {
        spears.push({x:player.x, y:player.y});
        if(player.powerUp) spears.push({x:player.x+20, y:player.y}, {x:player.x-20, y:player.y});
    }
};
window.onkeyup = e => keys[e.code] = false;
canvas.onclick = () => { if(state!=='PLAYING') startLevel(level); };
setInterval(() => { update(); draw(); }, 1000/60);
</script>
</body>
</html>
