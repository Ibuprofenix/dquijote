<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 1: Los Molinos de Criptana</title>
    <link rel="stylesheet" href="maestro.css">
    <script src="motor.js" defer></script>
    <script src="interfaz.js" defer></script>
    <style>
        /* Estilos para el registro inicial del caballero */
        #registro-inicial {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; justify-content: center;
            align-items: center; z-index: 2000; color: white; font-family: 'Georgia', serif;
        }
        .form-caja {
            background: #3e2723; padding: 40px; border: 3px solid #f1c40f;
            border-radius: 15px; text-align: center; box-shadow: 0 0 30px rgba(241,196,15,0.4);
        }
        .form-caja input {
            padding: 12px; font-size: 1.2rem; width: 250px; margin: 20px 0;
            border-radius: 5px; border: none; text-align: center;
        }
        .btn-registro {
            padding: 12px 30px; background: #f1c40f; color: #3e2723;
            border: none; font-weight: bold; cursor: pointer; border-radius: 5px;
            font-size: 1.1rem; transition: background 0.3s;
        }
        .btn-registro:hover { background: #d4ac0d; }
    </style>
</head>
<body>

    <div id="registro-inicial">
        <div class="form-caja">
            <h2 style="color: #f1c40f; margin-top: 0;">¡BIENVENIDO, HIDALGO!</h2>
            <p>Identificaos para que vuestras hazañas sean recordadas:</p>
            <input type="text" id="nombreUsuario" placeholder="Vuestro nombre..." maxlength="15">
            <br>
            <button class="btn-registro" onclick="iniciarSesion()">ENTRAR EN COMBATE</button>
        </div>
    </div>

    <h1 class="game-header">LOS MOLINOS DE CRIPTANA</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <script>
        // --- CONFIGURACIÓN DE URLS ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzDQKeRoY27_L3cpX3qb3YvW1vMhHdpx2OHamZumKs4TqPgE93Smjzu6SPmY4RYEqiR/exec";
        const WEB_PUNTUACIONES = "https://educastur.sharepoint.com/sites/lospasosdelcid/SitePages/La_Mancha_Invaders.aspx?csf=1&web=1&e=GZTQm7&CID=c144ab21-57f7-4f02-a507-0e15c77abb06";

        let usuarioActual = "";

        function iniciarSesion() {
            const input = document.getElementById('nombreUsuario');
            if (input.value.trim() !== "") {
                usuarioActual = input.value.trim();
                document.getElementById('registro-inicial').style.display = 'none';
            } else {
                alert("Debéis indicar un nombre, caballero.");
            }
        }

        function enviarYVerPuntuaciones() {
            const puntos = window.Interfaz ? Interfaz.puntuacion : 0;
            if (confirm(`¿Deseáis registrar vuestros ${puntos} puntos y ver el ranking?`)) {
                fetch(`${WEB_APP_URL}?nombre=${encodeURIComponent(usuarioActual)}&puntos=${puntos}`, { mode: 'no-cors' });
                window.location.href = WEB_PUNTUACIONES;
            }
        }

        function añadirBotonPuntuaciones() {
            const menu = document.getElementById('menu-final');
            if (menu && !document.getElementById('btn-ver-puntos')) {
                const btn = document.createElement('button');
                btn.id = 'btn-ver-puntos';
                btn.innerText = "REGISTRAR Y VER RANKING";
                btn.style = "margin-top: 15px; padding: 12px 25px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; font-family: 'Georgia', serif;";
                btn.onclick = enviarYVerPuntuaciones;
                menu.appendChild(btn);
            }
        }

        window.onload = () => {
            const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
            let quijote = { x: 400, y: 530, vidas: 3 };
            let enemigos = [], proyectiles = [], lanzas = [], trizas = [], activo = false;
            let hDir = 1, velHorda = 0.8;

            function posicionarEnemigos() {
                enemigos = [];
                for(let f=0; f<3; f++) {
                    for(let c=0; c<8; c++) {
                        enemigos.push({ x: 100 + (c * 85), y: 80 + (f * 100), cargando: false, timer: 0, rot: Math.random() * Math.PI });
                    }
                }
            }
            posicionarEnemigos();

            function crearTrizas(x, y) {
                playSfx('trizas'); 
                if (window.Interfaz) Interfaz.añadirPuntos(100);
                for(let i=0; i<12; i++) {
                    trizas.push({ x: x, y: y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, vida: 35 });
                }
            }

            function init() {
                if (window.Interfaz) Interfaz.puntuacion = 0;
                proyectiles = []; lanzas = []; trizas = [];
                quijote.vidas = 3; quijote.x = 400;
                posicionarEnemigos();
                if (window.SistemaPuntos) SistemaPuntos.iniciarCronometro();
                activo = true;
            }

            function loop() {
                ctx.clearRect(0, 0, 800, 600);
                if (window.dibujarUI) dibujarUI(ctx, quijote.vidas);

                enemigos.forEach(e => {
                    if (activo) e.rot += 0.04;
                    ctx.drawImage(imgM, e.x - 45, e.y - 45, 90, 90);
                    ctx.save();
                    ctx.translate(e.x, e.y - 10); ctx.rotate(e.rot);
                    ctx.drawImage(imgA, -50, -50, 100, 100);
                    ctx.restore();
                });

                if (!activo && quijote.vidas > 0 && enemigos.length > 0) {
                    mostrarMensaje(ctx, "PANTALLA 1: LOS MOLINOS", "Pulsa ESPACIO para combatir");
                } else if (activo) {
                    let bajar = false;
                    enemigos.forEach(e => {
                        e.x += velHorda * hDir;
                        if (e.x > 760 || e.x < 40) bajar = true;
                        if (!e.cargando && Math.random() < 0.005) e.cargando = true;
                        if (e.cargando) {
                            ctx.fillStyle = "rgba(255, 215, 0, 0.2)";
                            ctx.beginPath(); ctx.arc(e.x, e.y - 10, 40, 0, Math.PI * 2); ctx.fill();
                            if (++e.timer > 40) {
                                proyectiles.push({ x: e.x, y: e.y, size: 20 });
                                e.cargando = false; e.timer = 0;
                            }
                        }
                    });

                    if (bajar) { hDir *= -1; enemigos.forEach(e => e.y += 20); }

                    if (teclado['ArrowLeft'] || teclado['a']) quijote.x -= 7;
                    if (teclado['ArrowRight'] || teclado['d']) quijote.x += 7;
                    quijote.x = Math.max(40, Math.min(760, quijote.x));

                    proyectiles.forEach((p, i) => {
                        p.y += 4; p.size += 0.4;
                        ctx.drawImage(imgF, p.x - p.size/2, p.y - p.size/2, p.size, p.size);
                        if (Math.abs(p.x - quijote.x) < 30 && Math.abs(p.y - quijote.y) < 30) {
                            quijote.vidas--; playSfx('daño'); proyectiles.splice(i, 1);
                        }
                    });

                    lanzas.forEach((l, i) => {
                        l.y -= 10;
                        ctx.drawImage(imgQ, 480, 440, 480, 440, l.x - 15, l.y - 15, 30, 30);
                        enemigos.forEach((e, ei) => {
                            if (Math.abs(l.x - e.x) < 45 && Math.abs(l.y - e.y) < 45) {
                                crearTrizas(e.x, e.y);
                                enemigos.splice(ei, 1); lanzas.splice(i, 1);
                            }
                        });
                    });

                    let sx = (teclado['ArrowLeft'] || teclado['ArrowRight']) ? 0 : 480;
                    ctx.drawImage(imgQ, sx, 0, 480, 440, quijote.x - 50, quijote.y - 45, 100, 92);

                    if (enemigos.length === 0 || quijote.vidas <= 0) {
                        activo = false;
                        if (enemigos.length === 0) playSfx('victoria');
                        
                        // CÁLCULO DE PUNTOS FINALES DESDE EL MOTOR
                        const res = window.SistemaPuntos ? SistemaPuntos.calcularPuntosFinales(quijote.vidas) : {total: Interfaz.puntuacion, tiempo: 0};
                        Interfaz.puntuacion = res.total;

                        const tit = enemigos.length === 0 ? "¡NIVEL COMPLETADO!" : "¡HABÉIS CAÍDO!";
                        const msg = enemigos.length === 0 ? `¡Logrado en ${res.tiempo}s! Bonus incluido.` : "Intentadlo de nuevo, hidalgo.";
                        
                        Interfaz.mostrarMenuFinal(tit, msg, enemigos.length === 0, "Nivel2");
                        setTimeout(añadirBotonPuntuaciones, 100);
                    }
                }
                requestAnimationFrame(loop);
            }

            window.addEventListener('keydown', (e) => {
                if (e.key === " " && usuarioActual !== "") {
                    if (!activo && quijote.vidas > 0) init();
                    else if (activo) { lanzas.push({ x: quijote.x, y: quijote.y - 30 }); playSfx('lanza'); }
                }
            });
            loop();
        };
    </script>
</body>
</html>
