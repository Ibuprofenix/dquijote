<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Quijote: La Gesta de los Gigantes</title>
    <!-- Tailwind para utilidades rápidas de diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tus archivos de estilos externos -->
    <link rel="stylesheet" href="maestro.css">
    <link rel="stylesheet" href="pantallas.css">
</head>
<body class="bg-stone-900 flex items-center justify-center min-h-screen">

    <!-- El ID nivel-1, nivel-2 o nivel-3 controla el cielo mediante JS -->
    <div id="game-container" class="nivel-1 shadow-2xl">
        
        <!-- 0. EL ASTRO (Sol/Luna dinámico) -->
        <div class="astro"></div>

        <!-- 1. CIELO Y NUBES -->
        <div class="contenedor-nubes">
            <div class="nube-css" style="width:120px; height:40px; top:30px; animation-duration:25s;"></div>
            <div class="nube-css" style="width:180px; height:60px; top:90px; animation-duration:40s; animation-delay:-10s;"></div>
            <div class="nube-css" style="width:140px; height:45px; top:150px; animation-duration:35s; animation-delay:-5s;"></div>
        </div>

        <!-- 2. FONDO: CAPAS DE ESCENARIO -->
        <div class="colina-principal"></div>
        <div class="pueblo-asset"></div>

        <!-- 3. INTERFAZ (HUD) -->
        <div id="hud-superior" class="hud-superior" style="display: none;">
            <div id="hud-nombre">HIDALGO</div>
            <div id="hud-corazones" class="text-xl">❤️❤️❤️</div>
            <div id="hud-tiempo" class="italic">LA MANCHA</div>
        </div>

        <!-- Barra de vida del Boss -->
        <div id="boss-ui" class="boss-container hidden">
            <div class="boss-label">GIGANTE COLOSO</div>
            <div class="boss-marco">
                <div id="boss-vida-roja" class="boss-vida-actual" style="width: 100%;"></div>
            </div>
        </div>

        <!-- 4. MENÚS DE JUEGO (Overlays) -->
        
        <!-- Pantalla de Registro -->
        <div id="registro-caballero" class="pantalla-overlay">
            <h1 class="gesta-titulo">¡A LA GESTA!</h1>
            <div class="tarjeta-cartoon shadow-xl">
                <p class="mb-4 text-xl font-bold">¿Cómo os llaman, caballero?</p>
                <input type="text" id="nombreJugador" placeholder="TU APODO..." maxlength="12" 
                       class="p-2 border-2 border-amber-900 rounded w-full text-center mb-4 text-black">
                <button id="btn-comenzar" class="btn-cartoon w-full">¡INICIAR!</button>
            </div>
        </div>

        <!-- Selector de Niveles -->
        <div id="resumenGesta" class="pantalla-overlay hidden">
            <h2 class="gesta-titulo">ELIGE DESTINO</h2>
            <div class="flex gap-4">
                <button class="btn-nivel card-nivel flex flex-col items-center" data-nivel="1">
                    <span class="text-4xl">⚔️</span>
                    <strong>MOLINOS</strong>
                </button>
                <button class="btn-nivel card-nivel flex flex-col items-center" data-nivel="2">
                    <span class="text-4xl">👹</span>
                    <strong>GIGANTES</strong>
                </button>
                <button class="btn-nivel card-nivel flex flex-col items-center" data-nivel="3">
                    <span class="text-4xl">👑</span>
                    <strong>EL COLOSO</strong>
                </button>
            </div>
        </div>

        <!-- 5. ACCIÓN (Canvas) -->
        <canvas id="gameCanvas" width="800" height="600" style="display: none;"></canvas>
        
        <!-- 6. EL SUELO -->
        <div class="suelo-base"></div>
        
    </div>

    <!-- CARGA DE SCRIPTS -->
    <!-- 1. Primero el motor de audio -->
    <script src="audio.js"></script>
    <!-- 2. Después la lógica que usa el audio -->
    <script src="juego.js"></script>

</body>
</html>
