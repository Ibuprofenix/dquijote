<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: El Rescate de Dulcinea</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Georgia', serif; overflow: hidden; }
        canvas { background: #f4e4bc; border: 8px solid #5d4037; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: crosshair; }
        #ui-layer { position: absolute; pointer-events: none; color: #3e2723; text-align: center; width: 800px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- ASSETS ---
    const imgQ = new Image(); imgQ.src = 'sprites_quijote.png';
    const imgM = new Image(); imgM.src = 'sprites_molinos.png';
    const imgG = new Image(); imgG.src = 'sprites_gigantes.png';
    const imgS = new Image(); imgS.src = 'sprites_sancho.png';

    // --- BANCO DE PREGUNTAS ---
    const quizBank = [
        { q: "¿En qué ciudad nació Cervantes?", o: ["a) Madrid", "b) Sevilla", "c) Alcalá de Henares", "d) Toledo"], c: "KeyC" },
        { q: "¿Por qué es el 'Manco de Lepanto'?", o: ["a) Nació así", "b) Herida en batalla", "c) Prisión", "d) Apodo falso"], c: "KeyB" },
        { q: "¿Nombre real de Don Quijote?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
        { q: "¿Qué cree que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
        { q: "¿Nombre del caballo de don Quijote?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" },
        { q: "¿En qué año se publica la 1.ª parte del Quijote?", o: ["a) 1605", "b) 1610", "c) 1615", "d) 1620"], c: "KeyA" },
        { q: "¿En qué año se publica la 2.ª parte del Quijote?", o: ["a) 1605", "b) 1610", "c) 1615", "d) 1620"], c: "KeyC" },
        { q: "¿Cuál no es una obra de Cervantes?", o: ["a) Los trabajos de Persiles y Segismunda", "b) Viaje del Parnaso", "c) Las novelas ejemplares", "d) La vida es sueño"], c: "KeyD" },
        { q: "¿Dónde sufre cautiverio Cervantes?", o: ["a) Estambul", "b) Argel", "c) Marraquech", "d) El Cairo"], c: "KeyB" },
        { q: "¿De dónde es Dulcinea, la amada de don Quijote?", o: ["a) Del Toboso", "b) De Toledo", "c) De Belmonte", "d) Guadalajara"], c: "KeyA" }
    ];

    // --- VARIABLES DE JUEGO ---
    let state = 'START'; // START, PLAY, SUMMARY, TRIVIA, WIN, GAMEOVER
    let level = 1;
    let lives = 3;
    let timer = 0;
    let score = 0;
    let frame = 0;
    let currentQuiz = [];
    let quizIndex = 0;
    let hasBalsamUsed = false;

    // Entidades
    let q = { x: 100, y: 300, w: 80, h: 100, speed: 5, facingRight: true, power: false };
    let enemies = [];
    let spears = [];
    let sancho = { x: -100, y: 450, state: 'HIDDEN', targetX: 100 };
    let item = { x: 0, y: 0, active: false, type: '', timer: 0 };
    let keys = {};

    // --- CONTROLES ---
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if (state === 'START' || state === 'SUMMARY') startLevel();
        if (state === 'TRIVIA') checkTrivia(e.code);
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function startLevel() {
        if (state === 'SUMMARY') level++;
        if (level > 3) return;
        
        state = 'PLAY';
        enemies = [];
        spears = [];
        timer = 0;
        
        if (level === 1) spawnEnemies(5, 'mill');
        if (level === 2) spawnEnemies(6, 'giant');
        if (level === 3) {
            enemies.push({ x: 600, y: 200, w: 150, h: 200, hp: 20, type: 'boss', sTimer: 0 });
        }
    }

    function spawnEnemies(count, type) {
        for(let i=0; i<count; i++) {
            enemies.push({ x: 400 + i*150, y: 250 + Math.random()*100, w: 80, h: 100, hp: level, type: type });
        }
    }

    // --- LÓGICA PRINCIPAL ---
    function update() {
        if (state !== 'PLAY') return;
        frame++;
        timer++;

        // Movimiento Quijote
        if (keys['ArrowRight']) { q.x += q.speed; q.facingRight = true; }
        if (keys['ArrowLeft']) { q.x -= q.speed; q.facingRight = false; }
        if (keys['ArrowUp']) q.y -= q.speed;
        if (keys['ArrowDown']) q.y += q.speed;
        if (keys['Space'] && frame % 15 === 0) fireSpear();

        // Límites
        q.x = Math.max(0, Math.min(canvas.width - q.w, q.x));
        q.y = Math.max(150, Math.min(canvas.height - q.h, q.y));

        // Sancho y Ayudas (Nivel 2+)
        if (level >= 2 && sancho.state === 'HIDDEN' && Math.random() < 0.005) sancho.state = 'IN';
        if (sancho.state === 'IN') {
            sancho.x += 2;
            if (sancho.x >= sancho.targetX) { dropItem(); sancho.state = 'OUT'; }
        } else if (sancho.state === 'OUT') {
            sancho.x -= 2;
            if (sancho.x < -100) sancho.state = 'HIDDEN';
        }

        // Item timer (3 segundos)
        if (item.active) {
            item.timer--;
            if (item.timer <= 0) item.active = false;
            if (hit(q, item)) {
                if (item.type === 'HEART') lives++;
                else { q.power = true; setTimeout(() => q.power = false, 5000); }
                item.active = false;
            }
        }

        // Enemigos y Boss
        enemies.forEach((e, index) => {
            if (e.type === 'giant') e.x -= 1;
            if (e.type === 'boss') {
                e.sTimer++;
                if (e.sTimer > 180) { // Invocar cada 3 seg
                    enemies.push({ x: e.x, y: e.y + 50, w: 60, h: 80, hp: 1, type: 'giant' });
                    e.sTimer = 0;
                }
            }
            if (hit(q, e)) { lives--; enemies.splice(index, 1); checkDeath(); }
        });

        // Proyectiles
        spears.forEach((s, si) => {
            s.x += 10;
            enemies.forEach((e, ei) => {
                if (hit(s, e)) {
                    e.hp--;
                    spears.splice(si, 1);
                    if (e.hp <= 0) enemies.splice(ei, 1);
                }
            });
        });

        if (enemies.length === 0) state = (level < 3) ? 'SUMMARY' : 'WIN';
    }

    function fireSpear() {
        spears.push({ x: q.x + q.w, y: q.y + q.h/2, w: 30, h: 10 });
        if (q.power) {
            spears.push({ x: q.x + q.w, y: q.y + q.h/2 - 20, w: 30, h: 10 });
            spears.push({ x: q.x + q.w, y: q.y + q.h/2 + 20, w: 30, h: 10 });
        }
    }

    function dropItem() {
        item = { x: sancho.x + 50, y: sancho.y, active: true, type: Math.random() > 0.5 ? 'HEART' : 'SPEAR', timer: 180 };
    }

    function checkDeath() {
        if (lives <= 0) {
            if (level === 3 && !hasBalsamUsed) {
                currentQuiz = quizBank.sort(() => 0.5 - Math.random()).slice(0, 3);
                quizIndex = 0;
                state = 'TRIVIA';
            } else {
                state = 'GAMEOVER';
            }
        }
    }

    function checkTrivia(keyCode) {
        if (keyCode === currentQuiz[quizIndex].c) {
            quizIndex++;
            if (quizIndex >= 3) { lives = 1; hasBalsamUsed = true; state = 'PLAY'; }
        } else {
            state = 'GAMEOVER';
        }
    }

    function hit(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    // --- RENDERIZADO ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dibujar Quijote (con espejo)
        ctx.save();
        if (!q.facingRight) { ctx.translate(q.x + q.w, 0); ctx.scale(-1, 1); ctx.drawImage(imgQ, 0, 0, 200, 250, 0, q.y, q.w, q.h); }
        else { ctx.drawImage(imgQ, 0, 0, 200, 250, q.x, q.y, q.w, q.h); }
        ctx.restore();

        // --- DENTRO DE LA FUNCIÓN draw() ---

// Reemplaza la sección que dibuja los enemigos por esta:

enemies.forEach(e => {
    if (e.type === 'mill') {
        // --- LÓGICA DE RECORTE PARA sprites_molinos.png (image_10.png) ---
        // Tu imagen es 2x2. Asumimos que cada cuadro es de 200x250px.
        let frameW = 200; 
        let frameH = 250;
        let col, row;

        // Decidimos qué frame usar basado en el tiempo (frame % 30 para animar lento)
        let animFrame = Math.floor(frame / 30) % 2; 

        if (e.hp > 0) {
            // MOLINO VIVO (Fila superior de image_10.png)
            row = 0; // Primera fila
            col = animFrame; // Columna 0 o 1 (Giro A o Giro B)
        } else {
            // MOLINO EXPLOTANDO (Fila inferior de image_10.png)
            // Nota: En el código actual, el enemigo se elimina al morir.
            // Para ver la explosión, necesitaríamos un estado 'EXPLODING'
            // Por ahora, si e.hp es 0, usamos la fila inferior.
            row = 1; // Segunda fila
            col = Math.floor(frame / 10) % 2; // Explosión rápida (col 0 o 1)
        }

        // Calculamos las coordenadas X e Y exactas en el spritesheet
        let sourceX = col * frameW;
        let sourceY = row * frameH;

        // Dibujamos el molino con recorte exacto y transparencia real
        ctx.drawImage(
            imgM, 
            sourceX, sourceY, frameW, frameH, // Recorte de image_10.png
            e.x, e.y, e.w, e.h             // Dibujo en pantalla
        );

    } else if (e.type === 'giant') {
        // Lógica para gigantes (franja horizontal de 4 frames esperada)
        let gFrame = Math.floor(frame / 15) % 4; // Animación de 4 frames
        ctx.drawImage(imgG, gFrame * 200, 0, 200, 250, e.x, e.y, e.w, e.h);
    }
});

        // Sancho
        if (sancho.state !== 'HIDDEN') ctx.drawImage(imgS, 0, 0, 200, 250, sancho.x, sancho.y, 80, 100);
        
        // Item
        if (item.active) {
            ctx.fillStyle = item.type === 'HEART' ? 'red' : 'gold';
            ctx.beginPath(); ctx.arc(item.x, item.y, 15, 0, Math.PI*2); ctx.fill();
        }

        // Proyectiles
        ctx.fillStyle = 'brown';
        spears.forEach(s => ctx.fillRect(s.x, s.y, s.w, s.h));

        // UI
        ctx.fillStyle = '#3e2723';
        ctx.font = '20px Georgia';
        ctx.fillText(`Vidas: ${lives} | Nivel: ${level}`, 20, 30);

        // Pantallas de Estado
        if (state === 'START') overlay("DON QUIJOTE: EL RESCATE", "Flechas para mover, Espacio para disparar. [Pulsa una tecla]");
        if (state === 'SUMMARY') overlay("NIVEL COMPLETADO", `Honor conservado: ${lives}\nPresteza (Tiempo): ${timer}\n[Pulsa para continuar]`);
        if (state === 'GAMEOVER') overlay("DERROTADO", "Tu honor ha caído en el campo de batalla.");
        if (state === 'WIN') overlay("¡VICTORIA!", "¡Has rescatado a tu enamorada Dulcinea\nde las manos de Frestón!");
        if (state === 'TRIVIA') {
            let cur = currentQuiz[quizIndex];
            overlay("EL BÁLSAMO DE FIERABRÁS", `${cur.q}\n\n${cur.o.join('  ')}\n\nResponde con A, B, C o D`);
        }

        requestAnimationFrame(() => { update(); draw(); });
    }

    function overlay(title, sub) {
        ctx.fillStyle = 'rgba(244, 228, 188, 0.85)';
        ctx.fillRect(50, 150, 700, 300);
        ctx.fillStyle = '#3e2723';
        ctx.textAlign = 'center';
        ctx.font = 'bold 40px Georgia';
        ctx.fillText(title, 400, 230);
        ctx.font = '20px Georgia';
        let lines = sub.split('\n');
        lines.forEach((l, i) => ctx.fillText(l, 400, 280 + i*30));
    }

    draw();
    </script>
</body>
</html>
