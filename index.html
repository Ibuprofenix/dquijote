<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: El Caballero de los Sprites</title>
    <style>
        body { background: #2c1b0e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Georgia', serif; }
        canvas { border: 4px solid #5d4037; background: #fdf5e6; image-rendering: pixelated; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    // --- CARGA DE ASSETS ---
    const assets = {
        quijote: { img: new Image(), src: 'sprites_quijote.png', loaded: false },
        gigantes: { img: new Image(), src: 'sprites_gigantes.png', loaded: false },
        explosiones: { img: new Image(), src: 'sprites_explosiones.png', loaded: false },
        sancho: { img: new Image(), src: 'sprites_sancho.png', loaded: false }
    };

    let assetsLoaded = 0;
    Object.values(assets).forEach(a => {
        a.img.src = a.src;
        a.img.onload = () => { assetsLoaded++; if(assetsLoaded === 4) init(); };
    });

    // --- COORDENADAS (Ajustadas para evitar recortes) ---
    const PLAYER_FRAMES = [{x: 0, y: 310, w: 300, h: 420}, {x: 310, y: 310, w: 300, h: 420}];
    const MOLINO_FRAME = {x: 710, y: 310, w: 280, h: 420};
    const GIGANTE_WALK = [{x: 0, y: 300, w: 250, h: 400}, {x: 250, y: 300, w: 250, h: 400}];
    const EXPLOSION_FRAMES = [{x: 0, y: 280, w: 250, h: 280}, {x: 250, y: 280, w: 250, h: 280}, {x: 500, y: 280, w: 250, h: 280}, {x: 750, y: 280, w: 250, h: 280}];

    // --- ESTADO DEL JUEGO ---
    let state = 'MENU';
    let level = 1, score = 0, lives = 3, timer = 0, animTick = 0;
    const keys = {};
    const player = { x: 400, y: 520, frame: 0 };
    let enemies = [], projectiles = [], spears = [], explosions = [];
    let enemyDir = 1, enemyCooldown = 0;

    function init() {
        console.log("Juego iniciado");
        requestAnimationFrame(gameLoop);
    }

    function startLevel(L) {
        level = L; lives = 3; timer = 0; enemies = []; spears = []; projectiles = [];
        let rows = L === 1 ? 3 : 2;
        if(L === 3) enemies.push({x: 400, y: 120, hp: 20, boss: true});
        for(let r=0; r<rows; r++) {
            for(let c=0; c<7; c++) {
                enemies.push({x: c*100+100, y: r*80 + (L===3?240:80), hp: L, boss: false});
            }
        }
        state = 'PLAYING';
    }

    function update() {
        if(state !== 'PLAYING') return;
        animTick++; timer++;

        // Movimiento Quijote
        if(keys['ArrowLeft'] && player.x > 50) { player.x -= 7; if(animTick%10===0) player.frame = 1 - player.frame; }
        if(keys['ArrowRight'] && player.x < 750) { player.x += 7; if(animTick%10===0) player.frame = 1 - player.frame; }

        // Enemigos
        let edge = false;
        enemies.forEach(e => {
            if(e.hp <= 0) return;
            if(!e.boss) { e.x += (1.2 + level*0.4) * enemyDir; if(e.x > 760 || e.x < 40) edge = true; }
            
            // Disparo enemigo
            if(enemyCooldown <= 0 && Math.random() < 0.005) {
                projectiles.push({x: e.x, y: e.y});
                enemyCooldown = 50;
            }
        });
        if(edge) { enemyDir *= -1; enemies.forEach(e => { if(!e.boss) e.y += 15; }); }
        if(enemyCooldown > 0) enemyCooldown--;

        // Colisiones lanzas
        spears.forEach((s, si) => {
            s.y -= 10;
            enemies.forEach(e => {
                if(e.hp > 0 && Math.abs(s.x - e.x) < 40 && Math.abs(s.y - e.y) < 50) {
                    e.hp--; spears.splice(si, 1);
                    if(e.hp <= 0) { score += 100; explosions.push({x: e.x, y: e.y, f: 0}); }
                }
            });
        });

        // Colisiones proyectiles
        projectiles.forEach((p, pi) => {
            p.y += 5;
            if(Math.hypot(p.x - player.x, p.y - player.y) < 30) {
                lives--; projectiles.splice(pi, 1);
                if(lives <= 0) state = 'GAMEOVER';
            }
        });

        // Limpieza y fin
        spears = spears.filter(s => s.y > 0);
        projectiles = projectiles.filter(p => p.y < 600);
        explosions.forEach((ex, i) => { if(animTick%5===0) ex.f++; if(ex.f > 3) explosions.splice(i, 1); });

        if(enemies.filter(e => e.hp > 0).length === 0) state = level === 3 ? 'WIN' : 'LEVEL_UP';
    }

    function draw() {
        ctx.fillStyle = "#fdf5e6"; ctx.fillRect(0,0,800,600);

        if(state === 'PLAYING') {
            // Dibujar Quijote
            const qf = PLAYER_FRAMES[player.frame];
            ctx.drawImage(assets.quijote.img, qf.x, qf.y, qf.w, qf.h, player.x-40, player.y-60, 80, 110);

            // Dibujar Enemigos
            enemies.forEach(e => {
                if(e.hp <= 0) return;
                let img = (level === 1 && !e.boss) ? assets.quijote.img : assets.gigantes.img;
                let frame = (level === 1 && !e.boss) ? MOLINO_FRAME : GIGANTE_WALK[animTick%20>10?1:0];
                let size = e.boss ? 180 : 70;
                ctx.drawImage(img, frame.x, frame.y, frame.w, frame.h, e.x-size/2, e.y-size/2, size, size*1.3);
            });

            // Balas y efectos
            ctx.fillStyle = "#5d4037"; spears.forEach(s => ctx.fillRect(s.x-2, s.y, 4, 25));
            ctx.fillStyle = "#333"; projectiles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, 7); ctx.fill(); });
            explosions.forEach(ex => {
                let f = EXPLOSION_FRAMES[ex.f];
                ctx.drawImage(assets.explosiones.img, f.x, f.y, f.w, f.h, ex.x-40, ex.y-40, 80, 80);
            });

            // UI
            ctx.fillStyle = "#3e2723"; ctx.font = "bold 20px Georgia"; ctx.textAlign = "left";
            ctx.fillText(`Gloria: ${score}  Honor: ${"♥".repeat(lives)}`, 20, 40);
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,800,600);
            ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "30px Georgia";
            let msg = state === 'MENU' ? "DON QUIJOTE: EL VIDEOJUEGO" : state === 'GAMEOVER' ? "GESTA INTERRUMPIDA" : "¡GESTA LOGRADA!";
            ctx.fillText(msg, 400, 300);
            ctx.font = "18px Georgia"; ctx.fillText("Clic para cabalgar", 400, 350);
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    window.onkeydown = e => { 
        keys[e.code] = true; 
        if(e.code === 'Space' && state === 'PLAYING') spears.push({x: player.x, y: player.y-40});
    };
    window.onkeyup = e => keys[e.code] = false;
    canvas.onclick = () => {
        if(state === 'MENU' || state === 'LEVEL_UP') startLevel(state === 'LEVEL_UP' ? level+1 : 1);
        if(state === 'GAMEOVER' || state === 'WIN') location.reload();
    };

</script>
</body>
</html>
