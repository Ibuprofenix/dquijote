<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Don Quijote: El Desenlace</title>
    <style>
        body { margin: 0; background: #d2b48c; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Georgia', serif; }
        canvas { background: #fdf5e6; border: 8px double #3e2723; box-shadow: 0 0 50px rgba(0,0,0,0.6); cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    // --- BANCO DE PREGUNTAS COMPLETO ---
    const quizBank = [
        { q: "¿Ciudad donde nació Cervantes?", o: ["a) Madrid", "b) Sevilla", "c) Alcalá de Henares", "d) Toledo"], c: "KeyC" },
        { q: "¿Por qué se le llama 'Manco de Lepanto'?", o: ["a) Nació así", "b) Herida en batalla", "c) Accidente en prisión", "d) Apodo falso"], c: "KeyB" },
        { q: "¿En qué batalla participó Cervantes?", o: ["a) Trafalgar", "b) Lepanto", "c) Bailén", "d) Navas de Tolosa"], c: "KeyB" },
        { q: "¿Años prisionero en Argel?", o: ["a) 1 año", "b) 3 años", "c) 5 años", "d) 10 años"], c: "KeyC" },
        { q: "¿Obra más famosa de Cervantes?", o: ["a) La Celestina", "b) Fuenteovejuna", "c) Don Quijote", "d) El Lazarillo"], c: "KeyC" },
        { q: "¿Siglo en el que vivió?", o: ["a) S. XIV", "b) S. XV", "c) S. XVI-XVII", "d) S. XVIII"], c: "KeyC" },
        { q: "¿Año de publicación del Quijote (1ª p.)?", o: ["a) 1492", "b) 1550", "c) 1605", "d) 1700"], c: "KeyC" },
        { q: "Además de escritor, fue...", o: ["a) Médico", "b) Soldado", "c) Pintor", "d) Rey"], c: "KeyB" },
        { q: "¿Nombre real de Don Quijote?", o: ["a) Alonso Quijano", "b) Sancho Panza", "c) Rodrigo Díaz", "d) Diego Mendoza"], c: "KeyA" },
        { q: "¿Nombre de su escudero?", o: ["a) Dulcinea", "b) Rocinante", "c) Sancho Panza", "d) Bartolomé"], c: "KeyC" },
        { q: "¿Qué animal monta el hidalgo?", o: ["a) Burro", "b) Caballo", "c) Mulo", "d) Camello"], c: "KeyB" },
        { q: "¿Nombre de su caballo?", o: ["a) Pegaso", "b) Babieca", "c) Rocinante", "d) Clavileño"], c: "KeyC" },
        { q: "¿Quién es Dulcinea?", o: ["a) Princesa real", "b) Mujer idealizada", "c) Madre de Sancho", "d) Reina"], c: "KeyB" },
        { q: "¿Qué cree que son los molinos?", o: ["a) Castillos", "b) Dragones", "c) Gigantes", "d) Brujos"], c: "KeyC" },
        { q: "¿Dónde es armado caballero?", o: ["a) Castillo", "b) Una venta", "c) Iglesia", "d) Su casa"], c: "KeyB" },
        { q: "¿Qué confunde con un yelmo?", o: ["a) Sombrero", "b) Bacía de barbero", "c) Olla", "d) Casco romano"], c: "KeyB" },
        { q: "¿Qué libros le volvieron loco?", o: ["a) Viajes", "b) Poesía", "c) Caballerías", "d) Ciencia"], c: "KeyC" },
        { q: "¿Cómo es Sancho Panza?", o: ["a) Fantasioso", "b) Realista y práctico", "c) Violento", "d) Triste"], c: "KeyB" },
        { q: "¿Por qué estuvo preso en Argel?", o: ["a) Delito", "b) Captura de piratas", "c) Deserción", "d) Espía"], c: "KeyB" },
        { q: "¿Intentos de fuga en Argel?", o: ["a) Ninguno", "b) Uno", "c) Cuatro", "d) Diez"], c: "KeyC" },
        { q: "¿Qué parte de su cuerpo inutilizó?", o: ["a) Pierna", "b) Brazo izq.", "c) Mano izq.", "d) Espalda"], c: "KeyC" },
        { q: "¿Cargo en la Hacienda Real?", o: ["a) Recaudador", "b) Contable", "c) Ministro", "d) Juez"], c: "KeyA" },
        { q: "¿Ciudad donde murió?", o: ["a) Alcalá", "b) Sevilla", "c) Valladolid", "d) Madrid"], c: "KeyD" },
        { q: "¿Época literaria?", o: ["a) Romanticismo", "b) Edad Media", "c) Renacimiento/Barroco", "d) Ilustración"], c: "KeyC" }
    ];

    // --- VARIABLES DE ESTADO ---
    const STATE_MENU = 0, STATE_PLAYING = 1, STATE_GAMEOVER = 2, STATE_VICTORY = 3, STATE_THE_END = 4, STATE_QUIZ = 5;
    let currentState = STATE_MENU;
    let level = 1, score = 0, lives = 3;
    let quizSequence = [], quizIndex = 0;
    let usedFierabras = false; 

    const player = { x: 400, y: 530, speed: 7, shake: 0, powerUp: 0 };
    const spears = [], projectiles = [], mills = [], particles = [], heartsOnGround = [], items = [];
    let sancho = { x: -100, y: 540, active: false, state: 'entering', timer: 0, sanchoUsed: false };
    let enemyDirection = 1, enemySpeed = 1.1, bladeRotation = 0, globalCooldown = 0;

    // --- MANEJO DE TECLADO ---
    window.onkeydown = (e) => {
        if (currentState === STATE_QUIZ) {
            let correctKey = quizSequence[quizIndex].c;
            if (e.code === correctKey) {
                quizIndex++;
                if (quizIndex >= 3) { // Superadas las 3 preguntas
                    usedFierabras = true;
                    startNewGame(3); // Reiniciar nivel 3 con 3 vidas
                }
            } else if (["KeyA", "KeyB", "KeyC", "KeyD"].includes(e.code)) {
                currentState = STATE_GAMEOVER;
            }
            return;
        }
        if (e.code === 'Space' && currentState === STATE_PLAYING) {
            const isPowered = player.powerUp > 0;
            spears.push({ x: player.x, y: player.y - 25, w: isPowered ? 8 : 4, h: isPowered ? 40 : 25, piercing: isPowered, color: isPowered ? "#ff6d00" : "#b71c1c" });
        }
        keys[e.code] = true;
    };
    const keys = {};
    window.onkeyup = (e) => keys[e.code] = false;

    canvas.onclick = () => { 
        if (currentState === STATE_MENU) startNewGame(1);
        else if (currentState === STATE_VICTORY) startNewGame(level + 1);
        else if (currentState === STATE_GAMEOVER || currentState === STATE_THE_END) currentState = STATE_MENU;
    };

    function startNewGame(targetLevel) {
        level = targetLevel; 
        if (level === 1) { score = 0; usedFierabras = false; }
        lives = 3; enemySpeed = 1.1 + (level * 0.4);
        spears.length = 0; projectiles.length = 0; particles.length = 0; heartsOnGround.length = 0; items.length = 0;
        player.powerUp = 0; player.x = 400; sancho.active = false; sancho.sanchoUsed = false;
        initEnemies(); currentState = STATE_PLAYING;
    }

    function initEnemies() {
        mills.length = 0;
        let rows = level === 1 ? 3 : 2;
        if (level === 3) { mills.push({ x: 400, y: 120, alive: true, hp: 15, boss: true }); rows = 1; }
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < 8; c++) {
                mills.push({ x: c * 90 + 80, y: r * 90 + (level === 3 ? 280 : 70), alive: true, hp: level === 1 ? 1 : 2 });
            }
        }
    }

    function update() {
        if (currentState !== STATE_PLAYING) return;
        if (keys['ArrowLeft'] && player.x > 50) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x < 750) player.x += player.speed;

        if (globalCooldown > 0) globalCooldown--;
        mills.forEach(m => {
            if (m.alive && globalCooldown <= 0 && Math.random() < (m.boss ? 0.05 : 0.01)) {
                let vx = 0, vy = (level === 1 ? 3.5 : 2.5);
                if (m.boss) {
                    let angle = Math.atan2(player.y - m.y, player.x - m.x);
                    vx = Math.cos(angle) * 5; vy = Math.sin(angle) * 5;
                }
                projectiles.push({ x: m.x, y: m.y + 20, vx, vy, type: level === 1 ? 'wind' : 'rock' });
                globalCooldown = m.boss ? 30 : 60;
            }
        });

        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i]; p.y += p.vy; p.x += p.vx;
            if (Math.hypot(p.x - player.x, p.y - player.y) < 25) { 
                lives--; player.shake = 10; projectiles.splice(i, 1);
                if (lives <= 0) {
                    if (level === 3 && !usedFierabras) {
                        currentState = STATE_QUIZ;
                        quizIndex = 0;
                        // Seleccionar 3 aleatorias sin repetir
                        quizSequence = [...quizBank].sort(() => 0.5 - Math.random()).slice(0, 3);
                    } else {
                        currentState = STATE_GAMEOVER;
                    }
                }
            } else if (p.y > 600 || p.x < 0 || p.x > 800) projectiles.splice(i, 1);
        }

        let activeEnemies = 0; let edgeHit = false;
        mills.forEach(m => {
            if (!m.alive) return; activeEnemies++;
            if (!m.boss) {
                m.x += enemySpeed * enemyDirection;
                if (m.x > 760 || m.x < 40) edgeHit = true;
                if (m.y + 30 >= player.y - 10) currentState = STATE_GAMEOVER;
            }
            spears.forEach((s, si) => {
                let r = m.boss ? 60 : 25;
                if (s.x > m.x - r && s.x < m.x + r && s.y > m.y - r && s.y < m.y + r) {
                    m.hp--; if (!s.piercing) spears.splice(si, 1);
                    if (m.hp <= 0) m.alive = false;
                }
            });
        });
        if (edgeHit) { enemyDirection *= -1; mills.forEach(m => { if(m.alive && !m.boss) m.y += 25; }); }
        for (let i = spears.length - 1; i >= 0; i--) { spears[i].y -= 12; if (spears[i].y < -50) spears.splice(i, 1); }
        bladeRotation += 0.08;
        if (activeEnemies === 0) currentState = (level === 3) ? STATE_THE_END : STATE_VICTORY;
    }

    function draw() {
        ctx.clearRect(0, 0, 800, 600);
        if (currentState === STATE_MENU) {
            ctx.fillStyle = "#3e2723"; ctx.textAlign = "center";
            ctx.font = "bold 50px Georgia"; ctx.fillText("DON QUIJOTE", 400, 220);
            ctx.font = "italic 18px Georgia"; ctx.fillText("Flechas: Mover | Espacio: Atacar", 400, 270);
            ctx.fillStyle = "#3e2723"; ctx.fillRect(300, 350, 200, 50);
            ctx.fillStyle = "#fdf5e6"; ctx.font = "bold 20px Georgia"; ctx.fillText("CABALGAR", 400, 382);
        } else if (currentState === STATE_QUIZ) {
            ctx.fillStyle = "rgba(62, 39, 35, 0.95)"; ctx.fillRect(50, 50, 700, 500);
            ctx.fillStyle = "#fdf5e6"; ctx.textAlign = "center";
            ctx.font = "bold 26px Georgia"; ctx.fillText("EL BÁLSAMO DE FIERABRÁS (Prueba " + (quizIndex + 1) + "/3)", 400, 120);
            let q = quizSequence[quizIndex];
            ctx.font = "20px Georgia"; ctx.fillText(q.q, 400, 200);
            q.o.forEach((opt, i) => ctx.fillText(opt, 400, 280 + (i * 50)));
            ctx.font = "italic 16px Georgia"; ctx.fillText("Responde con A, B, C o D para sanar", 400, 500);
        } else {
            // Dibujado de Quijote, molinos, proyectiles... (estilo mantenido)
            ctx.fillStyle = "#eee"; ctx.beginPath(); ctx.ellipse(player.x, player.y+10, 12, 18, Math.PI/2, 0, 7); ctx.fill();
            spears.forEach(s => { ctx.fillStyle = s.color; ctx.fillRect(s.x-s.w/2, s.y-s.h, s.w, s.h); });
            projectiles.forEach(p => { ctx.fillStyle = p.type==='rock'?"#5d4037":"#ccc"; ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, 7); ctx.fill(); });
            mills.forEach(m => { if(!m.alive) return; ctx.save(); ctx.translate(m.x, m.y); if(m.boss) ctx.scale(2.5,2.5); ctx.fillStyle="#8d6e63"; ctx.fillRect(-15,-10,30,40); ctx.rotate(bladeRotation); for(let i=0; i<4; i++){ctx.rotate(Math.PI/2); ctx.strokeRect(-2,5,4,20);} ctx.restore(); });
            
            ctx.fillStyle = "#3e2723"; ctx.font = "bold 18px Georgia"; ctx.textAlign = "left";
            ctx.fillText("Capítulo " + level + " | Honor: " + "♥".repeat(lives), 20, 40);
            if (currentState === STATE_GAMEOVER) { ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,600); ctx.fillStyle="white"; ctx.textAlign="center"; ctx.fillText("GESTA INTERRUMPIDA", 400, 300); }
            if (currentState === STATE_THE_END) { ctx.fillStyle = "#fdf5e6"; ctx.fillRect(0,0,800,600); ctx.fillStyle="#3e2723"; ctx.textAlign="center"; ctx.fillText("¡DULCINEA ESTÁ A SALVO!", 400, 300); }
        }
        requestAnimationFrame(() => { update(); draw(); });
    }
    draw();
</script>
</body>
</html>
