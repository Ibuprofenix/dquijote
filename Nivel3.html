<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 3: El Duelo Final</title>
    <link rel="stylesheet" href="maestro.css">
    <script src="motor.js" defer></script>
	<script src="interfaz.js" defer></script>
</head>
<body>
    <h1 class="game-header">EL GIGANTE SUPREMO</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        window.onload = () => {
            const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
            const ANCHO_G = 70, ALTO_G = 90;
            const DIST_FILA = 115, DIST_COL = 85, LIMITE_FILAS = 4; 

            let quijote = { x: 400, y: 530, vidas: 3, armaReforzada: false, timerArma: 0 };
            let boss = { x: 340, y: 15, vidaMax: 100, vida: 100, frame: 2, timerAnim: 0, dir: 1, fase: 1 };
            let sancho = { x: -150, activo: false, yaAparecio: false, estado: 'espera' };

            let gigantes = [], misLanzas = [], proyectilesEnemigos = [], ayudasEnSuelo = [], trizas = [];
            let hordaX = 0, hordaY = 150, hordaDir = 1, hordaVel = 0.8; 
            let hordaYAlGenerar = 150, globalAnimTimer = 0, activo = false, bajasParaItem = 0;

            function crearTrizas(x, y) {
                playSfx('trizas');
                for(let i=0; i<12; i++) {
                    trizas.push({ x: x + 35, y: y + 45, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, vida: 40 });
                }
            }

            function generarFila(yRelativa) {
                let filasActivas = new Set(gigantes.filter(g => g.activo).map(g => g.yRel)).size;
                if (filasActivas >= LIMITE_FILAS) return;
                for (let c = 0; c < 8; c++) {
                    gigantes.push({ xRel: 100 + (c * DIST_COL), yRel: yRelativa, vida: 3, activo: true, timerAtaque: 0 });
                }
                boss.frame = 3; boss.timerAnim = 0;
            }

            function iniciarNivel3() {
                gigantes = []; trizas = []; proyectilesEnemigos = []; ayudasEnSuelo = [];
                quijote = { x: 400, y: 530, vidas: 3, armaReforzada: false, timerArma: 0 };
                sancho = { x: -150, activo: false, yaAparecio: false, estado: 'espera' };
                boss.vida = 100; boss.fase = 1; boss.x = 340;
                generarFila(0); generarFila(DIST_FILA); 
                hordaYAlGenerar = hordaY; activo = true;
            }

            function loop() {
                ctx.clearRect(0, 0, 800, 600);
                dibujarUI(ctx, quijote.vidas);

                if (!activo && boss.vida > 0) {
                    mostrarMensaje(ctx, "DUELO FINAL", "Pulsa ESPACIO para combatir");
                } else if (activo) {
                    globalAnimTimer++;

                    // Movimiento Quijote
                    if (teclado['ArrowLeft'] || teclado['a']) quijote.x -= 7;
                    if (teclado['ArrowRight'] || teclado['d']) quijote.x += 7;
                    quijote.x = Math.max(50, Math.min(750, quijote.x));

                    // Lógica Sancho
                    if (quijote.vidas === 1 && !sancho.yaAparecio) {
                        sancho.activo = true; sancho.yaAparecio = true; sancho.estado = 'entrando';
                    }
                    if (sancho.activo) {
                        if (sancho.estado === 'entrando') {
                            sancho.x += 3;
                            if (sancho.x >= 100) {
                                sancho.estado = 'lanzando';
                                ayudasEnSuelo.push({ x: sancho.x + 50, y: quijote.y, tipo: 'vida', timer: 350 });
                                setTimeout(() => sancho.estado = 'volviendo', 800);
                            }
                        } else if (sancho.estado === 'volviendo') {
                            sancho.x -= 3; if (sancho.x < -150) sancho.activo = false;
                        }
                    }

                    // Movimiento del Boss (Libre desde el inicio)
                    let vBoss = (boss.fase === 2) ? 6 : 3.5;
                    boss.x += vBoss * boss.dir;
                    if (boss.x > 680 || boss.x < 20) boss.dir *= -1;

                    // Ataque del Boss
                    let probAtaque = (boss.fase === 2) ? 0.03 : 0.015;
                    if (Math.random() < probAtaque) {
                        proyectilesEnemigos.push({ x: boss.x + 55, y: boss.y + 110, tipo: 'roca_boss' });
                    }

                    // Lógica Horda
                    hordaX += hordaVel * hordaDir;
                    let bIzq = 1000, bDer = 0, hayGigantes = false;
                    gigantes.forEach(g => {
                        if (!g.activo) return;
                        hayGigantes = true;
                        let xR = g.xRel + hordaX;
                        if (xR < bIzq) bIzq = xR;
                        if (xR + ANCHO_G > bDer) bDer = xR + ANCHO_G;
                    });
                    if (hayGigantes && (bDer > 780 || bIzq < 20)) { hordaDir *= -1; hordaY += 20; }
                    
                    if (hordaY - hordaYAlGenerar >= DIST_FILA) {
                        let minYRel = gigantes.length > 0 ? Math.min(...gigantes.map(g => g.yRel)) : 0;
                        generarFila(minYRel - DIST_FILA);
                        hordaYAlGenerar = hordaY; 
                    }

                    boss.timerAnim++;
                    if (boss.timerAnim > 30 && boss.frame === 3) boss.frame = 2;
                    if (boss.fase === 1 && boss.vida < 50) boss.fase = 2;

                    actualizarEntidades();
                }
                
                dibujarTodo();
                requestAnimationFrame(loop);
            }

            function actualizarEntidades() {
                gigantes.forEach(g => {
                    if (!g.activo) return;
                    let yReal = g.yRel + hordaY;
                    if (g.timerAtaque > 0) {
                        g.timerAtaque--;
                        if (g.timerAtaque === 1) proyectilesEnemigos.push({ x: g.xRel + hordaX + 35, y: yReal + 80, tipo: 'roca' });
                    } else if (Math.random() < 0.003) g.timerAtaque = 45; 
                    if (yReal + ALTO_G >= 520) irANivel("Nivel1");
                });

                misLanzas.forEach((l, li) => {
                    l.y -= 12;
                    if (l.y < boss.y + 130 && l.x > boss.x && l.x < boss.x + 110) {
                        boss.vida -= quijote.armaReforzada ? 2 : 1;
                        playSfx('daño'); misLanzas.splice(li, 1);
                        if (boss.vida <= 0) { 
                            activo = false; playSfx('victoria');
                            mostrarMensaje(ctx, "¡PAZ RESTAURADA!", "Has vencido al Gigante Supremo");
                        }
                    }
                    // Colisión con gigantes
                    gigantes.forEach(g => {
                        if (!g.activo) return;
                        let gx = g.xRel + hordaX, gy = g.yRel + hordaY;
                        if (l.x > gx && l.x < gx + ANCHO_G && l.y > gy && l.y < gy + ALTO_G) {
                            g.vida -= quijote.armaReforzada ? 3 : 1;
                            if (!quijote.armaReforzada) misLanzas.splice(li, 1);
                            if (g.vida <= 0) { 
                                g.activo = false; crearTrizas(gx, gy);
                                if (++bajasParaItem >= 4) { 
                                    ayudasEnSuelo.push({ x: gx + 35, y: 530, tipo: 'rayo', timer: 200 }); 
                                    bajasParaItem = 0; 
                                }
                            }
                        }
                    });
                });

                proyectilesEnemigos.forEach((p, pi) => {
                    p.y += (p.tipo === 'roca_boss') ? 8 : 4;
                    if (Math.abs(p.x - quijote.x) < 35 && Math.abs(p.y - quijote.y) < 35) {
                        quijote.vidas--; playSfx('daño'); proyectilesEnemigos.splice(pi, 1);
                        if (quijote.vidas <= 0) irANivel("Nivel1");
                    }
                    if (p.y > 600) proyectilesEnemigos.splice(pi, 1);
                });

                ayudasEnSuelo.forEach((a, ai) => {
                    a.timer--;
                    if (Math.abs(quijote.x - a.x) < 40) {
                        if (a.tipo === 'vida') quijote.vidas = 2;
                        else { quijote.armaReforzada = true; quijote.timerArma = 480; }
                        playSfx('victoria'); ayudasEnSuelo.splice(ai, 1);
                    } else if (a.timer <= 0) ayudasEnSuelo.splice(ai, 1);
                });
                if (quijote.timerArma > 0) quijote.timerArma--; else quijote.armaReforzada = false;
            }

            function dibujarTodo() {
                if (activo) {
                    // Boss con filtro según fase
                    ctx.save();
                    if (boss.fase === 2) ctx.filter = "hue-rotate(-50deg) drop-shadow(0 0 15px red)";
                    ctx.drawImage(imgG, boss.frame * 1024, 0, 1024, 1300, boss.x, boss.y, 110, 140);
                    ctx.restore();

                    // Barra de vida
                    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(150, 575, 500, 12);
                    ctx.fillStyle = boss.fase === 1 ? "#e74c3c" : "#ff0000";
                    ctx.fillRect(150, 575, (boss.vida/100)*500, 12);

                    // Horda
                    gigantes.forEach(g => {
                        if (!g.activo) return;
                        ctx.save();
                        if (g.vida === 2) ctx.filter = "brightness(0.7)";
                        if (g.vida === 1) ctx.filter = "sepia(1) hue-rotate(-50deg)";
                        let fX = (globalAnimTimer % 60 < 30 ? 2 : 3);
                        if (g.timerAtaque > 25) fX = 1;
                        ctx.drawImage(imgG, fX * 1024, 0, 1024, 1300, g.xRel + hordaX, g.yRel + hordaY, ANCHO_G, ALTO_G);
                        ctx.restore();
                    });

                    // Quijote
                    let sx = (teclado['ArrowLeft'] || teclado['ArrowRight']) ? 0 : 480;
                    ctx.drawImage(imgQ, sx, 0, 480, 440, quijote.x - 50, quijote.y - 45, 100, 92);
                }

                // Sancho (Independiente del estado activo para su animación de salida)
                if (sancho.activo) {
                    ctx.save();
                    if (sancho.estado === 'volviendo') { 
                        ctx.translate(sancho.x + 100, 0); ctx.scale(-1, 1); 
                        ctx.drawImage(imgS, 0, 0, 1024, 1024, 0, quijote.y - 50, 100, 100); 
                    } else { 
                        ctx.drawImage(imgS, 0, 0, 1024, 1024, sancho.x, quijote.y - 50, 100, 100); 
                    }
                    ctx.restore();
                }

                // Efectos y Proyectiles
                trizas.forEach((t, i) => {
                    t.x += t.vx; t.y += t.vy; t.vida--;
                    ctx.fillStyle = "#5d4037"; ctx.globalAlpha = t.vida / 40;
                    ctx.fillRect(t.x, t.y, 3, 3);
                    if (t.vida <= 0) trizas.splice(i, 1);
                });
                ctx.globalAlpha = 1.0;

                misLanzas.forEach(l => {
                    ctx.fillStyle = quijote.armaReforzada ? "#f1c40f" : "#fff";
                    ctx.fillRect(l.x - 2, l.y, 4, 18);
                });

                proyectilesEnemigos.forEach(p => {
                    let sz = p.tipo === 'roca_boss' ? 45 : 25;
                    ctx.drawImage(imgR, p.x - sz/2, p.y - sz/2, sz, sz);
                });

                ayudasEnSuelo.forEach(a => { 
                    ctx.font = "30px Arial"; ctx.textAlign="center";
                    ctx.fillText(a.tipo === 'vida' ? "❤️" : "⚡", a.x, a.y); 
                });
            }

            window.addEventListener('keydown', (e) => { 
                if (e.key === " " ) {
                    if (!activo && boss.vida > 0) iniciarNivel3();
                    else if (activo) {
                        playSfx('lanza');
                        if (quijote.armaReforzada) { 
                            misLanzas.push({ x: quijote.x - 18, y: quijote.y }, { x: quijote.x + 18, y: quijote.y }); 
                        } else misLanzas.push({ x: quijote.x, y: quijote.y });
                    }
                }
            });
            loop();
        };
    </script>
</body>
</html>
