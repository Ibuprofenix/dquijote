<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel 2: La Horda de Gigantes</title>
    <link rel="stylesheet" href="maestro.css">
    <script src="motor.js" defer></script>
	<script src="interfaz.js" defer></script>
</head>
<body>
    <h1 class="game-header">LA HORDA DE GIGANTES</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <script>
        window.onload = () => {
            const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
            let quijote = { x: 400, y: 530, vidas: 3, armaReforzada: false, timerArma: 0 };
            let sancho = { x: -150, activo: false, yaAparecio: false, estado: 'espera' };
            let enemigos = [], proyectiles = [], lanzas = [], ayudasEnSuelo = [], trizas = [], activo = false;
            let hDir = 1, bajasParaItem = 0;

            function crearTrizas(x, y) {
                playSfx('trizas'); 
                for(let i=0; i<12; i++) {
                    trizas.push({ x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, vida: 35 });
                }
            }

            function init() {
                enemigos = []; proyectiles = []; lanzas = []; ayudasEnSuelo = []; trizas = [];
                quijote = { x: 400, y: 530, vidas: 3, armaReforzada: false, timerArma: 0 };
                sancho = { x: -150, activo: false, yaAparecio: false, estado: 'espera' };
                // Llenar enemigos solo al iniciar
                for(let f=0; f<3; f++) {
                    for(let c=0; c<8; c++) {
                        enemigos.push({ x: 100+(c*85), y: 80+(f*100), frame: 2, t: 0, vida: 2, timerAtaque: 0 });
                    }
                }
                activo = true;
            }

            function loop() {
                ctx.clearRect(0, 0, 800, 600);
                dibujarUI(ctx, quijote.vidas);

                // --- LÓGICA DE INICIO ---
                if (!activo) {
                    if (enemigos.length === 0) { // Pantalla de bienvenida real
                         mostrarMensaje(ctx, "PANTALLA 2: LA HORDA", "Pulsa ESPACIO para combatir");
                    }
                } else {
                    // Lógica Quijote
                    if (teclado['ArrowLeft'] || teclado['a']) quijote.x -= 7;
                    if (teclado['ArrowRight'] || teclado['d']) quijote.x += 7;
                    quijote.x = Math.max(40, Math.min(760, quijote.x));

                    // Lanza
                    lanzas.forEach((l, i) => {
                        l.y -= 12;
                        enemigos.forEach((e, ei) => {
                            if (Math.abs(l.x - e.x) < 40 && Math.abs(l.y - e.y) < 40) {
                                e.vida--; lanzas.splice(i, 1);
                                if (e.vida <= 0) {
                                    crearTrizas(e.x, e.y); enemigos.splice(ei, 1);
                                    if (++bajasParaItem >= 3) { 
                                        ayudasEnSuelo.push({ x: e.x, y: 530, tipo: 'rayo', timer: 240 }); 
                                        bajasParaItem = 0; 
                                    }
                                } else playSfx('daño');
                            }
                        });
                        if (l.y < 0) lanzas.splice(i, 1);
                    });

                    // Enemigos
                    let bajar = false;
                    enemigos.forEach(e => {
                        e.x += 1.5 * hDir;
                        if (e.x > 760 || e.x < 40) bajar = true;
                        e.t++; if (e.t > 30) { e.t = 0; e.frame = (e.frame === 2 ? 3 : 2); }
                        if (e.timerAtaque > 0) {
                            e.timerAtaque--; if (e.timerAtaque === 1) proyectiles.push({ x: e.x, y: e.y });
                        } else if (Math.random() < 0.005) e.timerAtaque = 40;
                        if (e.y > 520) irANivel("Nivel1"); 
                    });
                    if (bajar) { hDir *= -1; enemigos.forEach(e => e.y += 25); }

                    // Proyectiles
                    proyectiles.forEach((p, i) => {
                        p.y += 6;
                        if (Math.abs(p.x - quijote.x) < 30 && Math.abs(p.y - quijote.y) < 30) {
                            quijote.vidas--; playSfx('daño'); proyectiles.splice(i, 1);
                        }
                        if (p.y > 600) proyectiles.splice(i, 1);
                    });

                    if (quijote.vidas <= 0) irANivel("Nivel1");
                    if (enemigos.length === 0) {
                        activo = false; playSfx('victoria');
                        mostrarMensaje(ctx, "¡HORDA DERROTADA!", "Cargando Batalla Final...");
                        setTimeout(() => { irANivel("Nivel3"); }, 2000);
                    }
                }

                // --- LÓGICA SANCHO (Independiente) ---
                if (quijote.vidas === 1 && !sancho.yaAparecio) { 
                    sancho.activo = true; 
                    sancho.yaAparecio = true; 
                    sancho.estado = 'entrando'; 
                }
                
                if (sancho.activo) {
                    if (sancho.estado === 'entrando') {
                        sancho.x += 3;
                        if (sancho.x >= 100) {
                            sancho.estado = 'lanzando';
                            ayudasEnSuelo.push({ x: sancho.x + 50, y: quijote.y, tipo: 'vida', timer: 350 });
                            setTimeout(() => sancho.estado = 'volviendo', 1000);
                        }
                    } else if (sancho.estado === 'volviendo') {
                        sancho.x -= 3; if (sancho.x < -150) sancho.activo = false;
                    }
                }

                // --- RENDERIZADO ---
                
                // Ayudas
                ayudasEnSuelo.forEach((a, ai) => {
                    a.timer--; ctx.font = "30px Arial"; ctx.textAlign="center";
                    ctx.fillText(a.tipo === 'vida' ? "❤️" : "⚡", a.x, a.y);
                    if (Math.abs(quijote.x - a.x) < 40 && activo) {
                        if (a.tipo === 'vida') quijote.vidas = 2;
                        else { quijote.armaReforzada = true; quijote.timerArma = 400; }
                        playSfx('victoria'); ayudasEnSuelo.splice(ai, 1);
                    } else if (a.timer <= 0) ayudasEnSuelo.splice(ai, 1);
                });

                // Enemigos
                enemigos.forEach(e => {
                    ctx.save();
                    if (e.vida === 1) ctx.filter = "brightness(0.5) sepia(1)";
                    let fX = (e.timerAtaque > 20) ? 1 : (e.timerAtaque > 0 ? 2 : e.frame);
                    ctx.drawImage(imgG, fX * 1024, 0, 1024, 1300, e.x - 40, e.y - 50, 80, 100);
                    ctx.restore();
                });

                // Armas
                lanzas.forEach(l => ctx.drawImage(imgQ, 480, 440, 480, 440, l.x - 15, l.y - 15, 30, 30));
                proyectiles.forEach(p => ctx.drawImage(imgR, p.x - 12, p.y - 12, 25, 25));
                
                // Trizas
                trizas.forEach((t, i) => {
                    t.x += t.vx; t.y += t.vy; t.vida--;
                    ctx.fillStyle = "#8d6e63"; ctx.globalAlpha = t.vida / 35;
                    ctx.fillRect(t.x, t.y, 4, 4); if(t.vida <= 0) trizas.splice(i, 1);
                });
                ctx.globalAlpha = 1.0;

                // Dibujar Sancho (A la misma altura que DQ)
                if (sancho.activo) {
                    ctx.save();
                    // y: quijote.y - 45 para coincidir visualmente
                    if (sancho.estado === 'volviendo') { 
                        ctx.translate(sancho.x + 100, 0); ctx.scale(-1, 1); 
                        ctx.drawImage(imgS, 0, 0, 1024, 1024, 0, quijote.y - 50, 100, 100); 
                    } else { 
                        ctx.drawImage(imgS, 0, 0, 1024, 1024, sancho.x, quijote.y - 50, 100, 100); 
                    }
                    ctx.restore();
                }

                // Dibujar Caballero (SOLO SI EL JUEGO ESTÁ ACTIVO)
                if (activo) {
                    let sx = (teclado['ArrowLeft'] || teclado['ArrowRight']) ? 0 : 480;
                    ctx.drawImage(imgQ, sx, 0, 480, 440, quijote.x - 50, quijote.y - 45, 100, 92);
                    if (quijote.timerArma > 0) quijote.timerArma--; else quijote.armaReforzada = false;
                }

                requestAnimationFrame(loop);
            }

            window.addEventListener('keydown', (e) => { 
                if (e.key === " ") { 
                    if (!activo && enemigos.length === 0) init(); 
                    else if (activo) {
                        playSfx('lanza');
                        if (quijote.armaReforzada) lanzas.push({ x: quijote.x - 20, y: quijote.y - 30 }, { x: quijote.x + 20, y: quijote.y - 30 });
                        else lanzas.push({ x: quijote.x, y: quijote.y - 30 });
                    }
                }
            });
            loop();
        };
    </script>
</body>
</html>
